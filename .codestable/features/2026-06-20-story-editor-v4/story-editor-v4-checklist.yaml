feature: 2026-06-20-story-editor-v4
created: 2026-06-20

steps:
  - action: "Graph Toolkit 兼容验证：确认当前 Unity 2022.3 环境下的可用性、包版本约束和 editor/runtime 边界"
    exit_signal: "得到明确结论：可直接用、需升级 Unity、需暂时兼容层、或需推迟 editor v4"
    status: done

  - action: "StoryProgram 名词层落盘：定义 StoryProgram、StoryChapter、StoryStep、StoryChoice、StoryCommand、StoryExpression、StoryValue、StoryVariableSchema、StoryCommandSchema"
    exit_signal: "运行时可编译且能纯内存表达章节、步骤、选项、命令、条件、变量和标签"
    status: done

  - action: "Story runtime 编排骨架：实现 StoryRunner / StoryModule v4 的 Register、Start、Continue、Select、CompleteCommand、Evaluate、CreateSnapshot、Restore"
    exit_signal: "最小闭环能从 line/choice/command 推进到 completed，snapshot restore 不半更新"
    status: done

  - action: "Bridge 层：实现 IStoryVariableStore、IStoryFunctionResolver、IStoryCommandHandler 及默认上下文契约"
    exit_signal: "变量读写、只读函数和等待型命令结果能通过 bridge 接入"
    status: done

  - action: "Compiler / validator：实现 Graph -> StoryProgram 归一化、校验、导出和迁移报告"
    exit_signal: "合法 graph 能稳定编译为 StoryProgram，非法字段/断边/未知命令/非法表达式可定位"
    status: done

  - action: "Editor v4 外壳：新增 StoryEditorV4 菜单、窗口、中文 story tree、Graph Toolkit 画布、palette、blackboard、inspector 和 tooltip"
    exit_signal: "能打开新编辑器并创建 / 编辑章节 graph，且 UI 不再依赖旧 unit/payload/owner 视图"
    status: done

  - action: "Migration：把 v3 Definition / StoryAuthoringAsset / legacy unit / payload / owner-action 数据迁移到 v4 graph/program"
    exit_signal: "旧数据能生成 v4 graph/program 或明确产生迁移警告"
    status: done

  - action: "验证覆盖与文档回写：补齐 runtime、compiler、editor、migration 的关键场景"
    exit_signal: "核心验收场景有自动测试或可复核证据，且不触发 Resource/Localization/Data/Procedure"
    status: done

checks:
  - item: "StoryProgram 保存 StoryId、Version、EntryChapterId、Chapters，并作为 runtime 主输入"
    source: 名词契约
    status: done
  - item: "StoryChapter 保存 ChapterId、Title、EntryStepId、Steps"
    source: 名词契约
    status: done
  - item: "StoryStep 保存 StepId、Kind、Data、Tags"
    source: 名词契约
    status: done
  - item: "StoryChoice 保存 ChoiceId、TextKey、Condition、Target"
    source: 名词契约
    status: done
  - item: "StoryCommand 保存 CommandId、Name、Arguments、WaitForCompletion、OutcomePorts"
    source: 名词契约
    status: done
  - item: "StoryExpression 支持变量、函数、字面量和复合输入"
    source: 名词契约
    status: done
  - item: "StoryVariableSchema 和 StoryCommandSchema 作为 schema 驱动扩展点存在"
    source: 名词契约
    status: done
  - item: "StoryRunner / StoryModule v4 提供 Register、Start、Continue、Select、CompleteCommand、Evaluate、CreateSnapshot、Restore"
    source: 名词契约
    status: done
  - item: "IStoryVariableStore、IStoryFunctionResolver、IStoryCommandHandler 作为 bridge 契约存在"
    source: 名词契约
    status: done
  - item: "Graph Toolkit 兼容验证给出当前 Unity 版本与目标包的可行性结论"
    source: 流程级约束
    status: done
  - item: "Story runtime 永远消费编译后的 StoryProgram，不消费 editor graph"
    source: 流程级约束
    status: done
  - item: "Continue / Select / CompleteCommand / Evaluate 不自动接管 Unity Update，也不直接调用 UI / Resource / Localization"
    source: 流程级约束
    status: done
  - item: "变量读写、函数、命令和 snapshot 校验失败都能返回带 story / chapter / step / node / field 定位的错误"
    source: 流程级约束
    status: done
  - item: "重复编译同一 graph id 不变、输出稳定"
    source: 流程级约束
    status: done
  - item: "新增命令 / 函数 / 节点模板必须走 registry schema"
    source: 流程级约束
    status: done
  - item: "StoryEditorV4 菜单项存在"
    source: 挂载点
    status: done
  - item: "Graph Toolkit editor 路径存在并可打开章节 graph"
    source: 挂载点
    status: done
  - item: "StoryCompiler 可由 editor graph 生成 StoryProgram"
    source: 挂载点
    status: done
  - item: "Migration 可从 v3 旧数据生成 v4 graph/program"
    source: 挂载点
    status: done
  - item: "N1-N3: 运行时注册、启动、继续、选择、命令完成、快照恢复的最小闭环成功"
    source: 验收场景
    status: done
  - item: "N4-N6: 变量 / 函数 / 命令 bridge 可被业务注入并驱动 runtime"
    source: 验收场景
    status: done
  - item: "N7-N10: 编辑器可打开、创建章节 graph、显示中文树、画布和 inspector，且不暴露旧 payload/unit/owner 视图"
    source: 验收场景
    status: done
  - item: "N11-N13: 编译、注册、推进、选择、命令完成符合 StoryProgram 契约"
    source: 验收场景
    status: done
  - item: "B1-B6: 兼容验证失败、未知命令、非法表达式、循环 guard、非法 snapshot、迁移警告都有明确错误"
    source: 验收场景
    status: done
  - item: "E1-E5: Runtime 不引用 UnityEditor / Graph Toolkit / GraphView；StoryModule 不直接调用 Resource/Localization/Data/Procedure/UI/Sound；旧 UI 字段不再作为主表单；不再强制 Sequence/Merge/Parallel"
    source: 验收场景
    status: done
