feature: 2026-06-19-ui-localization-binding
created: 2026-06-19

steps:
  - action: "Editor 结构微重构：把 UIDocumentInspector 中已有 TreeView 嵌套类搬到独立 Editor-only 文件"
    exit_signal: "Inspector 行为不变，AutoBind、组件下拉和 TreeView 仍可用，Editor 编译通过"
    status: done
  - action: "runtime 数据骨架：新增 UILocalizedTextBinding，并让 UIDocument 暴露只读 LocalizedTexts"
    exit_signal: "prefab 可序列化保存空本地化绑定数组，旧 mappings 不受影响"
    status: done
  - action: "Inspector 设置入口：在绑定行或详情区为 Text / TMP_Text 组件显示 localization key 输入"
    exit_signal: "选择文本组件后可填写 key，清空 key 会移除 binding"
    status: done
  - action: "生成器收集与校验：把 localized text bindings 映射到已有 model 字段"
    exit_signal: "缺失组件、非文本组件、组件未选入 binding、重复 component 和空 key 都能失败定位"
    status: done
  - action: "生成刷新代码：输出初始刷新、LocaleChanged 订阅和 Release 取消订阅"
    exit_signal: "带 key 的窗口生成 RefreshLocalization，无 key 的窗口不引用 Localization"
    status: done
  - action: "验证覆盖：补齐生成代码编译、语言切换刷新、释放取消订阅和范围守护"
    exit_signal: "Editor / Runtime 快速编译通过，关键验收场景有自动测试或手工证据"
    status: done

