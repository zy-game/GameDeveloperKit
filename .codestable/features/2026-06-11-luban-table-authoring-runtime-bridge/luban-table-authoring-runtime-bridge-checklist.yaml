feature: 2026-06-11-luban-table-authoring-runtime-bridge
created: 2026-06-12

steps:
  - action: "Editor 结构微重构：把当前窗口拆成 window shell、profile panel、workspace panel、status panel，并把 settings/model/runner 与 UI 分开"
    exit_signal: "行为保持一期一致，窗口仍能 check/generate，编译通过"
    status: done

  - action: "表发现和 table index：接入 luban.conf、Excel inline header、generated output reconcile，建立 LubanTableDefinition"
    exit_signal: "当前 #test.xlsx 能扫描出 Tbtest，并显示 dataKey=tbtest、row type cfg.test"
    status: done

  - action: "表列表与详情 UI：展示 table list、fields、source、diagnostics 和文件打开操作"
    exit_signal: "用户能从窗口定位 #test.xlsx、test.cs、tbtest.json"
    status: done

  - action: "选择生成：扩展 profile 的 scope/selected tables，命令预览和 runner 追加 --outputTable"
    exit_signal: "勾选 Tbtest 后预览含 -o Tbtest，生成成功；错误表名会显示 Luban 错误"
    status: done

  - action: "ConfigModule-compatible 模板：建立项目 custom template dir，生成 IConfig、Newtonsoft 和可选 TableOption adapter"
    exit_signal: "生成出的 cfg.test 能通过 App.Config.LoadTableAsync<cfg.test>(path) 加载 tbtest.json"
    status: done

  - action: "表定义配置：实现安全的 source writer，新建表骨架和已知元数据保存，复杂 source 降级只读"
    exit_signal: "新建/修改后 Luban check 可观察通过或显示明确 source 错误"
    status: done

  - action: "验证覆盖：覆盖命令构造、table name/data key 映射、custom template dir、ConfigModule 加载 Luban JSON、旧非 Luban 表不回归"
    exit_signal: "Editor/Runtime 编译通过，关键场景有测试或手动证据"
    status: done

