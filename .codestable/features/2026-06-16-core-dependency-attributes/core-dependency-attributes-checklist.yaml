    exit_signal: "两个 attribute 类型可编译，DependencyType 只读属性存在"
    status: done
  - action: "构造校验：实现 null 校验和 ModuleDependencyAttribute 的 IGameModule 类型校验"
    exit_signal: "null 抛 ArgumentNullException，非 IGameModule 类型抛 GameException"
    status: done
  - action: "契约测试：覆盖属性值、空参数、非法模块类型和 AttributeUsage"
    exit_signal: "Runtime.Tests 中新增测试文件并覆盖所有验收场景"
    status: done
  - action: "首批标注：给 Event、Download、Resource、Config、Sound、UI 添加静态模块依赖标记"
    exit_signal: "Runtime.Tests 能反射读到 roadmap 第 4.6 节约定的依赖类型集合"
    status: done
  - action: "编译验证：运行 Runtime 与 Runtime.Tests 快速编译"
    exit_signal: "dotnet build GameDeveloperKit.Runtime.csproj --no-restore 与 dotnet build GameDeveloperKit.Runtime.Tests.csproj --no-restore 均通过，或记录不可运行原因"
    status: done

