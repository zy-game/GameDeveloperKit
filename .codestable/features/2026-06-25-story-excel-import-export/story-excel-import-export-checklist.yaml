feature: 2026-06-25-story-excel-import-export
created: 2026-06-25

steps:
  - action: "依赖集成：ExcelDataReader 放入 Editor 插件目录 + 添加 EPPlus NuGet + 验证 .xlsx 读写"
    exit_signal: "Editor 测试脚本中成功创建/读取/写入简单 .xlsx 文件"
    status: done

  - action: "导出 ChapterDefine：实现 StoryExcelExporter，先只写 ChapterDefine sheet"
    exit_signal: "导出的 .xlsx 含 ChapterId/Title/Description/EntryNodeId/PreviewImage，Excel 正常打开"
    status: done

  - action: "导出 ChapterData：补齐节点数据导出，Args 为 key=value 格式，Targets 为 [nodeId,...] 格式"
    exit_signal: "sample_story_graph 完整导出，6 列齐全，Args/Targets 格式正确"
    status: done

  - action: "导入解析：实现 StoryExcelImporter，解析 ChapterDefine + ChapterData，校验必填字段、NodeKind、Args 格式"
    exit_signal: "合法 Excel 返回空错误；非法 Excel 返回带行号的校验错误；原数据不变"
    status: done

  - action: "导入 Targets 解析 + 原子写入：解析 Targets 构建 Edge，全部校验通过后写入 StoryAuthoringAsset"
    exit_signal: "导出→不做修改导入→节点图完全一致（幂等往返验证通过）"
    status: done

  - action: "预览图 + 简介 Editor 侧：StoryAuthoringChapter 加 PreviewImage/Description 字段，章节树显示缩略图"
    exit_signal: "Inspector 中设置后可保存重开不丢失，章节列表可见缩略图"
    status: done

  - action: "预览图 + 简介 Runtime 通道：编译器 → StoryChapter → StoryProgramAsset 全链路"
    exit_signal: "编译 sample_story_graph，runtime 读取 StoryChapter.PreviewImagePath/Description 有正确值"
    status: done

  - action: "菜单接入 + 端到端验证：两条 [MenuItem] 接入，完整导入导出→编译→播放流程"
    exit_signal: "通过菜单完成导出→修改 Excel→导入→编译→Editor 播放全流程通过"
    status: done

checks:
  - item: "导出 sample_story_graph 后 ChapterDefine 有 4 行，ChapterData 含所有节点"
    source: 验收场景
    status: pending

  - item: "导出 Excel 在 Excel/WPS 中正常打开，6 列可读，Args 为 key=value 对，Targets 为纯 ID 数组"
    source: 验收场景
    status: pending

  - item: "空章节导出至少有 Start/End 两行，Targets 列有值"
    source: 验收场景
    status: pending

  - item: "导出到已有路径覆盖写入"
    source: 验收场景
    status: passed

  - item: "导出→不做修改导入→节点图完全一致（幂等往返）"
    source: 验收场景
    status: pending

  - item: "缺失 ChapterId 列的 Excel 导入失败，原数据不变"
    source: 验收场景
    status: passed

  - item: "含非法 NodeKind 的 Excel 导入失败，report 列出非法行号和值"
    source: 验收场景
    status: passed

  - item: "Targets 引用不存在的 NodeId 导入失败，report 列出悬空引用"
    source: 验收场景
    status: passed

  - item: "非 .xlsx 文件导入立即返回错误"
    source: 验收场景
    status: passed

  - item: "Inspector 设章节 PreviewImage 后保存重开不丢失"
    source: 验收场景
    status: pending

  - item: "编译后 Runtime 读取 StoryChapter.PreviewImagePath/Description 有正确值或 null"
    source: 验收场景
    status: passed

  - item: "Args 往返：导出 key=value 对 → 导入 → 参数完全一致"
    source: 验收场景
    status: passed

  - item: "导入不改变 StoryAuthoringAsset.StoryId、Version"
    source: 范围守护
    status: passed

  - item: "导入不修改 StoryGraphLayout 节点位置"
    source: 范围守护
    status: passed

  - item: "StoryRunner/StoryFrame/StoryStep 中不出现 PreviewImage/Description 引用"
    source: 范围守护
    status: passed

  - item: "导入不自动创建 ChapterDefine 未列出的 chapter"
    source: 范围守护
    status: passed
