feature: 2026-06-09-timer-global-clock-phase-gating
created: 2026-06-09

steps:
  - action: "契约对齐：把 Timer clock 从 per-phase 数组收敛为单一全局状态"
    exit_signal: "LateUpdate 和 FixedUpdate phase 不再改变 TimerModule.Tick、Time 或 UnscaledTime"
    status: done
  - action: "Context 对齐：所有 update handle context 使用全局 clock，同时保留 internal phase 标记"
    exit_signal: "LateUpdate 和 FixedUpdate callback 收到的 context.Tick 等于当前 module.Tick"
    status: done
  - action: "FPS gate：为 LateUpdateTimerHandle 和 FixedUpdateTimerHandle 增加可选 fps 门控"
    exit_signal: "未传 fps 时每个匹配 phase 都调用；传 fps 时不足间隔不调用，达到间隔后调用"
    status: done
  - action: "Snapshot 与测试契约：补 UnscaledTime 观测，并替换旧 per-phase clock 测试"
    exit_signal: "Timer Runtime 测试覆盖全局 clock、phase 分流、fps 非法值、异常隔离和 snapshot"
    status: done
  - action: "文档回写：同步 architecture 和 runtime-scheduling-diagnostics roadmap 中 Timer clock 语义"
    exit_signal: "文档不再声称 Timer 维护三类内部 clock"
    status: done

