feature: 2026-06-21-story-runtime-multitrack-frame
created: 2026-06-21

steps:
  - action: "Runtime 名词骨架：新增 StoryFrame、StoryFrameTrack 和创建 helper"
    exit_signal: "runtime 编译通过，能手动构造 text、command、wait、choice frame"
    status: done
  - action: "Runner frame 解析：把 ResolveUntilStop 升级为 frame builder，并让推进 API 直接返回 StoryFrame"
    exit_signal: "单步 Line、Choice、Command、Wait、Completed 场景能通过 CurrentFrame 表达等价信息，旧 CurrentOutput 调用侧已迁移"
    status: done
  - action: "多轨聚合语义：支持连续 presentation steps 合并为一个 frame"
    exit_signal: "构造 PlayVideo -> Choice 或 ShowImage -> PlayAudio -> Narration -> Choice program 时，一个 frame 同时含 command、text、choices"
    status: done
  - action: "命令/选择/等待闸口：收紧 Select、CompleteCommand、Evaluate 对当前 frame 的合法性和推进规则"
    exit_signal: "非法 choice/command 抛错，合法 choice/outcome/time 推进到正确目标"
    status: done
  - action: "StoryModule 桥接与播放窗口读取：让 Editor 播放窗口只渲染 CurrentFrame"
    exit_signal: "播放窗口能同屏显示视频命令、文本和选项"
    status: done
  - action: "测试与文档收口：补 runtime/editor tests、更新 requirement/architecture 和播放窗口验收说明"
    exit_signal: "runtime/editor build 通过，runtime 隔离 grep 通过，示例覆盖至少两个多轨组合"
    status: done

