feature: 2026-06-20-editor-graph-manual-acceptance
created: 2026-06-20

steps:
  - action: "交互清单固化：把 Story Editor 的 graph 操作整理成可执行手测清单"
    exit_signal: "右键、Space、Delete、Esc、F、节点拖拽、端口拖线、palette 拖入、框选、pan/zoom 和 wire 对齐都有明确触发动作与期望结果"
    status: done
  - action: "自动测试对齐：确认可离屏验证的 graph kit 契约已有测试覆盖，缺口补测试"
    exit_signal: "Editor.Tests 编译通过，测试覆盖 Delete 委托、缩放锚点、palette 外部释放、adapter 边界和 runtime 不引用 editor graph"
    status: done
  - action: "真实 Editor 手测：在 Unity Editor 中打开 Story Editor 并按清单操作"
    exit_signal: "每个手测场景记录 passed / failed / blocked 和必要说明"
    status: done
  - action: "失败项闭环：对手测失败项进行修复或记录 issue/fix-note"
    exit_signal: "没有未解释的失败项；阻塞项有明确复现和下一步"
    status: done
  - action: "roadmap 回写：验收通过后回写 story-editor-hardening item 状态"
    exit_signal: "editor-graph-manual-acceptance 标为 done，items.yaml 校验通过"
    status: done

