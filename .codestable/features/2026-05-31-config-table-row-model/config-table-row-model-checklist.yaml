  - action: "来源编排收紧：HTTP/HTTPS 走 DownloadModule，非 URL path 走 ResourceModule，本地文件读取只作为测试兜底"
    exit_signal: "错误消息能区分下载失败、资源缺失和 JSON 解析失败"
    status: done
  - action: "查询语义收敛：模块级和表实例级查询都返回 TRow，未加载表查询抛 GameException"
    exit_signal: "Find<Example>、Where<Example>、FirstOrDefault<Example> 编译并返回 Example，未加载表查询抛 GameException"
    status: done
  - action: "缓存和并发校验：按 typeof(TRow) 处理 cache、pending、unload"
    exit_signal: "同类型并发加载只读一次，Unload<Example>() 后可重新加载新内容"
    status: done
  - action: "验证覆盖：更新 ConfigModule tests 到 Table<Example> 模型"
    exit_signal: "Runtime 编译通过，关键验收场景均有测试或可观察证据"
    status: done

