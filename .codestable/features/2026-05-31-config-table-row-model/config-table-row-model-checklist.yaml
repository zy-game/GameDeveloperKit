  - action: "加载 API 收敛：ConfigModule 只保留 LoadTableAsync<TRow>() 和 LoadTableAsync<TRow>(path) 两类入口"
    exit_signal: "所有测试和调用点都以配置行类型作为泛型参数，并返回 Table<TRow>"
