feature: 2026-06-22-ui-window-partial-codegen
created: 2026-06-22

steps:
  - action: "模板输出微重构：把 UIDocumentGenerator 的脚本文本生成函数拆到相邻 partial/helper 文件，只搬不改行为"
    exit_signal: "旧四件套输出内容无语义差异，Editor 编译通过"
    status: done
  - action: "名称契约：实现 UI_ExampleWindow 类型名和 .Design / .Model 文件名推导"
    exit_signal: "给定 prefab 名 UI_ExampleWindow 且选择输出目录 xxx 时，生成 xxx/UI_ExampleWindow/UI_ExampleWindow.cs、xxx/UI_ExampleWindow/UI_ExampleWindow.Design.g.cs、xxx/UI_ExampleWindow/UI_ExampleWindow.Model.g.cs，当前无数据绑定时 Model 为空壳"
    status: done
  - action: "新 partial 输出：生成用户逻辑 skeleton 和 design partial，组件字段全部落在 design partial"
    exit_signal: "新生成结果不包含顶层 model、nested component model、per-window module 或 controller 类型"
    status: done
  - action: "生命周期与本地化接入：把绑定初始化、localization 订阅/刷新和释放放进 design helper"
    exit_signal: "打开窗口后组件字段可用，语言切换刷新，Release 取消订阅并清空 design 组件字段"
    status: done
  - action: "迁移样本与范围守护：迁移当前 Loading 示例，确认旧 controller/module 不再被新窗口引用"
    exit_signal: "grep 不再命中新生成代码对 LoadingController、LoadingModule 或顶层 LoadingModel 的引用"
    status: done
  - action: "验证覆盖：补生成器验证或编译验证，覆盖正常、边界、错误场景"
    exit_signal: "Runtime 快速编译通过，Editor 侧生成器相关编译可验证"
    status: done

