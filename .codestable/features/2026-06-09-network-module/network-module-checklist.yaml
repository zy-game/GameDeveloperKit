feature: 2026-06-09-network-module
created: 2026-06-09

steps:
  - action: "名词骨架：建立 NetworkModule、IChannel、Message、MessageHandle<T>、MessageSubscription、HTTP request/response 和错误分类"
    exit_signal: "模块可注册，公开类型可编译，空 registry 状态可查询"
    status: done
  - action: "Channel 编排骨架：实现 channel registry、生命周期状态、connect/close 的可替换 transport 空壳"
    exit_signal: "可创建命名 channel，重复 name 失败，关闭和 shutdown 清理 registry"
    status: done
  - action: "消息发送与响应等待：实现 SendAsync(request) 的 sequence/pending slot 登记、WaitAsync<TResponse>(request) 的响应等待、超时/关闭失败和响应匹配"
    exit_signal: "模拟 transport 回包可完成对应 wait，未连接发送、未发送等待和超时路径可观察"
    status: done
  - action: "消息分发注册：实现 MessageHandle<T>、Action<T>、Action<Message> 注册、取消、快照分发和 handler 异常隔离"
    exit_signal: "主动推送消息按注册顺序触发，取消后不触发，单个 handler 异常不阻断其他 handler"
    status: done
  - action: "HTTP 封装：接入 UnityWebRequest adapter，完成 request/response、timeout、headers/body 和错误分类"
    exit_signal: "普通 GET/POST 可返回响应，HTTP 错误和网络错误被分类"
    status: done
  - action: "生命周期与验证：补齐 shutdown pending wait 清理、日志/状态快照和关键验收场景"
    exit_signal: "编译通过，正常/边界/错误路径都有可观察证据"
    status: done

checks:
  - item: "NetworkModule 可注册，注册后访问 App.Network 返回已注册 NetworkModule 实例"
    source: 验收场景
    status: done
  - item: "CreateChannel(\"game\", endpoint) 返回 name 为 game 的 IChannel，TryGetChannel(\"game\") 可取回同一实例"
    source: 验收场景
    status: done
  - item: "重复创建同名 channel 抛 GameException，原 channel 不被替换"
    source: 验收场景
    status: done
  - item: "channel.ConnectAsync() 成功后 Status == Connected"
    source: 验收场景
    status: done
  - item: "IChannel 公开 ConnectAsync、CloseAsync、SendAsync(Message request)、WaitAsync<TResponse>(Message request)、Register<TMessage>、Subscribe<TMessage> 和 Subscribe(Action<Message>)"
    source: 名词契约
    status: done
  - item: "SendAsync(request) 发送前分配 SequenceId 并创建 pending slot，成功返回不代表服务端已响应"
    source: 编排骨架
    status: done
  - item: "WaitAsync<TResponse>(request) 等待与 request 同一 SequenceId 关联的响应，并按 TResponse 返回"
    source: 名词契约
    status: done
  - item: "已连接 channel 调用 SendAsync(pingRequest) 后再调用 WaitAsync<PingResponse>(pingRequest)，收到相同 SequenceId 响应后返回 PingResponse，pending 项被移除"
    source: 验收场景
    status: done
  - item: "响应在调用 WaitAsync<PingResponse>(pingRequest) 前已经到达时，WaitAsync 仍返回已完成响应，不丢包"
    source: 验收场景
    status: done
  - item: "收到没有命中 pending 的 ChatMessage 时，已注册 MessageHandle<ChatMessage> 和 Action<ChatMessage> 被调用"
    source: 验收场景
    status: done
  - item: "收到任意 message 时，已注册 Action<Message> 兜底回调被调用"
    source: 验收场景
    status: done
  - item: "MessageSubscription.Cancel() 后再次收包时，对应 handler/callback 不再触发"
    source: 验收场景
    status: done
  - item: "某个消息 handler 抛异常时，该异常被记录，其他 handler 继续收到同一消息，channel 不因 callback 异常关闭"
    source: 流程级约束
    status: done
  - item: "CloseAsync() 时存在 pending wait，则 pending wait 以关闭/取消类错误完成，channel 状态变为 Closed"
    source: 验收场景
    status: done
  - item: "Shutdown() 关闭所有 channel，清空 registry，清理订阅和 pending wait"
    source: 验收场景
    status: done
  - item: "SendHttpAsync(GET request) 成功返回 2xx 时返回 HttpResponse，包含 status、headers 和 body"
    source: 验收场景
    status: done
  - item: "SendHttpAsync(POST json request) 携带 body 和 content-type，成功时返回响应 body"
    source: 验收场景
    status: done
  - item: "CreateChannel(null/空白, endpoint) 抛 ArgumentNullException 或 ArgumentException"
    source: 验收场景
    status: done
  - item: "CreateChannel(name, null endpoint) 抛 ArgumentNullException"
    source: 验收场景
    status: done
  - item: "未连接 channel 调用 SendAsync(request) 抛 GameException 或返回未连接失败，不登记 pending"
    source: 验收场景
    status: done
  - item: "request 未经过 SendAsync 就调用 WaitAsync<TResponse>(request) 抛 GameException，提示 request 没有可等待的 pending slot"
    source: 验收场景
    status: done
  - item: "Subscribe<TMessage>(null) 和 Register<TMessage>(null) 抛 ArgumentNullException"
    source: 验收场景
    status: done
  - item: "重复调用 CloseAsync() 或 Shutdown() 是 no-op，不抛异常"
    source: 验收场景
    status: done
  - item: "socket transport 连接失败时 ConnectAsync() 失败，Status == Failed 或回到 Closed，错误可观察"
    source: 验收场景
    status: done
  - item: "WaitAsync<TResponse>(request) 超时时返回超时失败，pending 项被移除"
    source: 验收场景
    status: done
  - item: "codec 解码失败时记录失败，不调用业务 handler，不破坏后续收包"
    source: 验收场景
    status: done
  - item: "HTTP URL 非 HTTP/HTTPS 或为空时抛 ArgumentException"
    source: 验收场景
    status: done
  - item: "HTTP 网络错误、超时、非 2xx 或数据处理错误时返回明确 NetworkFailureKind 或抛携带分类的 NetworkException"
    source: 验收场景
    status: done
  - item: "App.Network 是框架网络模块访问入口"
    source: 挂载点
    status: done
  - item: "App.StartupInternal() 登记 NetworkModule，位置不让 Debug 依赖 Network transport"
    source: 挂载点
    status: done
  - item: "Assets/GameDeveloperKit/Runtime/Network/ 承载 Network runtime 类型集合"
    source: 挂载点
    status: done
  - item: "实现阶段不新增第三方网络库依赖；如确需 WebSocket/TCP 包，必须先回到 design 更新决策"
    source: 范围守护
    status: done
  - item: "Network 代码不写入 Application.temporaryCachePath + \"/downloads\"，不创建 .download 或 .part 文件"
    source: 范围守护
    status: done
  - item: "Network 不修改 DownloadModule 的暂停、恢复、取消、分块下载语义"
    source: 范围守护
    status: done
  - item: "Network 不引用战斗同步、rollback、frame sync、RPC proxy 或对象复制相关类型"
    source: 范围守护
    status: done
  - item: "DebugModule 不重新新增 sink/transport/analytics 列表；Debug 日志外发不在本 feature 自动接线"
    source: 范围守护
    status: done
  - item: "不新增跨线程安全承诺相关 lock/concurrent collection 作为公开保证"
    source: 范围守护
    status: done
