feature: 2026-05-20-download-module
created: 2026-05-20

steps:
  - action: "名词层落盘：定义 DownloadStatus、DownloadHandler、DownloadListHandler、DownloadModule 的公开契约"
    exit_signal: "类型和公开成员存在，项目可编译"
    status: done

  - action: "单文件编排骨架：DownloadModule.DownloadAsync 创建 DownloadHandler，handler 能进入 Waiting/Downloading/Completed/Failed/Canceled 状态"
    exit_signal: "单文件 happy path 可下载到 temp 并通过 WaitCompletionAsync 等待完成"
    status: done

  - action: "暂停/失败恢复/取消计算节点：接入请求取消、temp 保留/删除、Range 恢复、Failed 状态重试"
    exit_signal: "暂停和失败保留 temp，恢复继续或重下，取消删除 temp"
    status: done

  - action: "大文件分片编排：接入 LargeFileThreshold、ChunkSize、Range 分片下载、part 文件合并和缺片恢复"
    exit_signal: "大文件在 Range 支持时走分片路径，暂停后恢复只补缺失分片，完成后合并为单个 temp 文件"
    status: done

  - action: "批量编排：DownloadListHandler 顺序驱动多个子 handler，单项失败继续后续任务"
    exit_signal: "批量结果包含每个子任务终态，单项失败不阻断"
    status: done

  - action: "回调与进度收口：补齐单文件/批量 ProgressChanged、Completed、Failed、Canceled 触发规则"
    exit_signal: "状态变化与 WaitCompletionAsync 完成顺序稳定，重复调用不重复触发终态事件"
    status: done

  - action: "验证覆盖：覆盖正常、暂停恢复、取消、失败继续、参数错误、Range 不支持、大文件分片等场景"
    exit_signal: "关键验收场景通过可运行验证"
    status: done

