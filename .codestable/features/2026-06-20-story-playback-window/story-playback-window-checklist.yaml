feature: 2026-06-20-story-playback-window
created: 2026-06-20

steps:
  - action: "微重构：把现有 StoryEditorPlaybackPreview 相关类型从 StoryEditorWindow.cs 拆到 Playback 目录，行为不变"
    exit_signal: "黑板快速预览仍可编译调用，Editor 编译通过，窗口大文件不再承载 preview helper"
    status: done
  - action: "Playback session 骨架：封装 compile/start/restart/shutdown/current output/history/error"
    exit_signal: "给定 sample program 能通过 session 使用 StoryModule 启动到第一个 output"
    status: done
  - action: "播放窗口静态 UI：新增独立 EditorWindow，显示 header、当前输出区、历史区、错误区和重启/继续控件"
    exit_signal: "从菜单或 Story Editor 入口能打开窗口并显示当前 story/chapter"
    status: done
  - action: "输出交互接通：实现 Line、ChoicesReady、Command、Wait、Completed 的按钮推进"
    exit_signal: "sample fixture 可手动走过选择、命令 outcome、等待和章节跳转"
    status: done
  - action: "命令参数展示和资源解析：显示 command argument 键值，资源字符串可尝试解析为 Editor asset 并显示解析结果"
    exit_signal: "PlayVideo、ShowImage、PlayAudio 命令可看见资源 key 或 asset 信息，且可手动完成"
    status: done
  - action: "验证和文档收口：补自动测试覆盖 session 推进，补手测记录，更新 requirement/architecture 现状"
    exit_signal: "dotnet build 通过；手测记录覆盖示例播放主路径和至少一个分支"
    status: done

