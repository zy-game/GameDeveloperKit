feature: 2026-05-28-command-module
created: 2026-05-28

steps:
  - action: "模块入口和名词骨架：建立 Super.Command、ICommand、CommandBase、CommandHistoryMode、CommandHistorySnapshot 和空栈状态"
    exit_signal: "注册模块后可获取 Super.Command，公开属性返回空历史状态"
    status: done
  - action: "Execute 主流程：实现命令执行、history mode 分支、redo 清理、容量淘汰和历史变化通知"
    exit_signal: "可撤销命令成功执行后进入 undo stack，新命令清空 redo stack"
    status: done
  - action: "Undo / Redo 编排：实现 peek 后执行、成功迁移、失败不迁移、空栈 no-op"
    exit_signal: "连续执行、撤销、重做的栈计数和命令副作用符合预期"
    status: done
  - action: "CommandGroup：实现组合命令的顺序执行、反向撤销、重做和失败回滚语义"
    exit_signal: "一组子命令只产生一个 undo 记录，撤销顺序正确"
    status: done
  - action: "生命周期清理：实现 Clear、Shutdown、淘汰释放和事件订阅清理"
    exit_signal: "清理后 undo / redo 为空，被释放命令收到 Release"
    status: done
  - action: "验证覆盖：覆盖正常、边界、错误和范围守护场景"
    exit_signal: "Runtime 快速编译通过，关键验收契约有可观察证据"
    status: done

