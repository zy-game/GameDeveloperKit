steps:
  - action: "Wait-owned Choice item：扩展端口策略、compiler synthetic choice 和本地图上混连诊断"
    exit_signal: "Wait.completed -> Choice A/B 可连线，编译后等待结束出现两个普通 StoryChoice"
    status: done
  - action: "组合模板注册：在节点库追加三个 editor-only pattern template id，并保持原单节点模板路径不变"
    exit_signal: "palette/menu 能看到三类互动模板，普通节点创建不受影响"
