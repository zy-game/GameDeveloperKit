    status: done
  - action: "seek 推导诊断：编译成功后把 PlayVideo 的 transition/disabled 结果投影成 Info 诊断，并保持播放窗口现有 slider 行为"
    exit_signal: "纯过渡视频显示 transition 信息，模板里的并行互动视频显示 disabled 信息，图修改后诊断不过期误导"
    status: done
