feature: 2026-06-20-choice-item-branching-contract
created: 2026-06-20

steps:
  - action: "微重构：把 StoryProgramCompiler 中 choice 编译相关 helper 拆到 compiler partial 文件"
    exit_signal: "拆分后编译通过；现有 line-to-choice-item 与旧式独立 Choice step 测试行为不变"
    status: done
  - action: "编译契约收紧：固化 choice item 识别、跳过独立 step、selected 单目标、条件合并和 textKey warning/error 语义"
    exit_signal: "合法 choice item 图生成 synthetic step；非法图返回带 story/chapter/node/port 定位的 compiler issue"
    status: done
  - action: "Runtime 输出命名：将选择输出语义收敛为 StoryOutputKind.ChoicesReady 并同步创建/测试口径"
    exit_signal: "Continue 到选择步骤时输出 kind 为 ChoicesReady，Choices 列表完整"
    status: done
  - action: "选择推进闭环：补齐 Select(choiceId) 成功、错误 id、非选择状态调用和 history 记录场景"
    exit_signal: "选择后跳到目标 step 或完成状态；错误包含 story/chapter/step/choice"
    status: done
  - action: "Story Editor 作者图口径：确保默认/fixture 选项分支使用 line-to-choice-item-to-selected-target"
    exit_signal: "v4 fixture 或测试不再把旧式多端口 Choice 作为主 authoring 入口"
    status: done
  - action: "测试与证据：补齐 compiler/runtime/editor 关键场景并运行相关构建"
    exit_signal: "Editor.Tests、Runtime.Tests 相关构建通过；diff check 通过"
    status: done

