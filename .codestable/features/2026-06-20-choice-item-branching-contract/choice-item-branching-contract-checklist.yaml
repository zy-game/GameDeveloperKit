    source: 名词契约
    status: passed
  - item: "运行时对 UI 表达选择就绪时使用 StoryOutputKind.ChoicesReady"
    source: 名词契约
    status: passed
  - item: "UI 只读取 output.Choices 并调用 Select(choiceId)，不直接执行 target"
    source: 名词契约
    status: passed
  - item: "ChoiceId 使用 choice item node id，TextKey 使用 textKey 参数"
    source: 名词契约
    status: passed
  - item: "line edge conditions 与 choice selected edge conditions 按 AND 合并"
    source: 名词契约
    status: passed
  - item: "编译器先识别 choice item id，再跳过这些节点的独立 step 编译"
    source: 编排骨架
    status: passed
  - item: "line node 编译后追加 synthetic choice step，id 默认 {lineNodeId}_choices"
    source: 编排骨架
    status: passed
  - item: "choice item 必须恰好一个 selected 输出目标"
    source: 编排骨架
    status: passed
