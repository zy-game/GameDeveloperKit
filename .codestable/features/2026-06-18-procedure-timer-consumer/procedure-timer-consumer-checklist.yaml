    source: 范围守护
    status: passed
  - item: "不新增 Procedure LateUpdate / FixedUpdate 配置"
    source: 范围守护
    status: passed
  - item: "Timer Update 推进后当前 procedure 收到 update"
    source: 验收场景
    status: passed
  - item: "切换期间 Timer Update 不继续调用旧 procedure"
    source: 验收场景
