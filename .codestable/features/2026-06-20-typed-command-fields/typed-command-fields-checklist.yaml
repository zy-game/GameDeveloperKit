feature: 2026-06-20-typed-command-fields
created: 2026-06-20

steps:
  - action: "微重构：把 StoryProgramCompiler 中 command 编译相关 helper 拆到 command partial 文件"
    exit_signal: "拆分后 Editor.Tests 构建通过；现有 PlayVideo compiler 行为不变"
    status: done
  - action: "schema 名词骨架：扩展参数值类型、节点参数定义和 StoryCommand typed argument metadata"
    exit_signal: "现有 Runtime.Tests / Editor.Tests 构建通过；旧 ArgumentNames 读取仍可用"
    status: done
  - action: "命令 schema 声明：把媒体命令字段改为 asset reference，并把 option 列表迁入 schema"
    exit_signal: "schema 查询能拿到 PlayVideo.clip 的 asset 类型 metadata"
    status: done
  - action: "graph 字段视图：让 EditorNodeGraphKit 支持 asset reference 字段，Story adapter 能映射资源选择字段"
    exit_signal: "V4 graph model 中 PlayVideo.clip 字段类型为 asset reference，仍可写回参数"
    status: done
  - action: "编译器导出：按 schema 编译 command arguments 与 typed command schema，处理 required/type/resource 错误和兼容 warning"
    exit_signal: "合法 PlayVideo 编译为 stable string argument；缺 clip / number 解析错误会定位 field"
    status: done
  - action: "runtime validation：按 StoryCommandSchema 校验 command arguments"
    exit_signal: "缺 required argument、类型不匹配、未知 command 都在 register 阶段失败并带定位"
    status: done
  - action: "测试与证据：补齐 editor graph model、compiler、runtime validation 关键场景并运行构建"
    exit_signal: "Editor.Tests、Runtime.Tests 构建通过，checklist 关键场景均有证据"
    status: done

