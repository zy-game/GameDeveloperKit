feature: 2026-06-23-story-playback-video-prewarm
created: 2026-06-23

steps:
  - action: "结构微重构：将 StoryAvProVideoPlayback 拆出到独立文件，保持即时播放行为不变"
    exit_signal: "StoryAvProVideoCommandPlayer public API 不变，StoryPlayback 程序集编译通过"
    status: done
  - action: "队列名词骨架：新增 preload status、handle、queue 的状态机与容量管理"
    exit_signal: "队列可入队、重复入队、淘汰、Release 和 Clear，且不会创建重复 key 条目"
    status: done
  - action: "AVPro 准备节点：队列创建 MediaPlayer 并监听 ReadyToPlay、FirstFrameReady、Error、Cancel"
    exit_signal: "预热状态能推进到 ReadyToPlay/FirstFrameReady/Failed/Canceled，Dispose 后无残留播放器对象"
    status: done
  - action: "PlayVideo 接管：播放命令优先 Acquire 预热播放器，未命中保持即时 OpenMedia fallback"
    exit_signal: "命中预热时复用 MediaPlayer 并进入 ActivePlaybacks，未命中时现有播放行为不退化"
    status: done
  - action: "前瞻与默认配置：接入 PreloadLookAheadCount，并让 StoryPlayerView 默认创建小容量队列"
    exit_signal: "当前视频播放后能 best-effort enqueue 后续视频，且不触碰 Loading/Procedure/Resource 初始化"
    status: done
  - action: "验证与范围守护：补测试或编译/grep 证据，覆盖队列状态、容量、Acquire ownership 和明确不做"
    exit_signal: "可用 build/tests 通过，范围守护 grep 无违规命中"
    status: done

