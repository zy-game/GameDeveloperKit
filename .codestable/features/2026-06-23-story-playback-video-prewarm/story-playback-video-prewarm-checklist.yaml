  - item: "存在 StoryAvProVideoPreloadStatus，包含 Pending、ReadyToPlay、FirstFrameReady、Failed、Canceled"
    source: 名词契约
    status: passed
  - item: "StoryAvProVideoPreloadHandle 暴露 Command、Source、ClipPath、ResolvedPath、Status、Error、IsTerminal、CanAcquire 和 StatusChanged"
    source: 名词契约
    status: passed
  - item: "StoryAvProVideoPreloadQueue 暴露 Capacity、Count、PreloadAsync、TryAcquire、Release、Clear 和 Dispose"
    source: 名词契约
    status: passed
  - item: "StoryAvProVideoCommandPlayer 暴露 PreloadQueue、PreloadLookAheadCount 和 PreloadVideoAsync，并保留 PlayVideo"
    source: 名词契约
    status: passed
  - item: "PreloadAsync 按 source + clipPath 作为 key，并与 PlayVideo 使用同一视频路径解析口径"
    source: 编排骨架
    status: passed
  - item: "ReadyToPlay 对应 AVPro ReadyToPlay 事件；FirstFrameReady 对应 AVPro FirstFrameReady 事件"
    source: 编排骨架
