feature: 2026-06-03-resource-editor-build-context-manifest
created: 2026-06-03

steps:
  - action: "构建模型收敛：新增全局 manifest version、固定 OUTPUT_ROOT，并统一使用 ResourceSettings.MANIFEST_NAME"
    exit_signal: "settings 默认值齐全；新构建不读取旧 output / target / manifest filename 用户值"
    status: done
  - action: "Header UI 改造：删除设置页和 package version，header 增加 channel / version / compression / target / output 摘要"
    exit_signal: "打开 Resource Editor 看不到“设置”按钮和 package 版本字段"
    status: done
  - action: "构建路径规则改造：构建使用 active target、固定 output root、固定 manifest name 和 header version"
    exit_signal: "旧 settings 残留不会改变输出路径或 manifest 文件名"
    status: done
  - action: "Bundle 逻辑名和 hash 分离：BundleInfo 增加 Hash，manifest writer 输出无后缀逻辑 name/hash/dependencies"
    exit_signal: "配置 bundle 名为 bundle1 或 bundle1.bundle 时，manifest 中 Name=bundle1、Hash=569d...，依赖列表不含 channel/platform/version/hash 文件名或 .bundle 后缀"
    status: done
  - action: "Runtime provider 寻址：provider 用 hash 生成 {hash}.bundle，旧 hash 为空时回退 name"
    exit_signal: "新 manifest 能加载 hash 文件；旧 manifest 仍能按 name 加载"
    status: done
  - action: "Publisher 常量同步：Publisher 本地版本扫描使用固定 output root 和 ResourceSettings.MANIFEST_NAME"
    exit_signal: "旧 output root 用户值不会影响 Publisher 发现 Build/ResourceBundles/{channel}/{target}/{version}/manifest.json"
    status: done
  - action: "Remote startup 收口：调整 ResourceModule.Startup 或 ManifestLocation 语义，避免远端 version 未知时调用 GetManifestAddress(\"\")"
    exit_signal: "ServerUrl 非空时先读取 publish pointer，再读取 version manifest；本地模式仍能读取 MANIFEST_NAME"
    status: done
  - action: "验证收尾：覆盖 header、旧字段残留、manifest 输出、provider 兼容、Publisher 扫描、publish pointer 和 Runtime 边界"
    exit_signal: "验收契约均有可观察证据"
    status: done

