feature: 2026-05-26-download-operation-handle
created: 2026-05-26

steps:
  - action: "契约对齐：下载公开状态统一使用 OperationStatus，删除下载侧独立 string Error"
    exit_signal: "单文件和批量 handler 的公开观察面可编译，状态统一来自 OperationHandle.Status，错误统一来自 OperationHandle.Error"
    status: done
  - action: "单文件 operation 骨架：让 DownloadHandler 能通过 operation 入口启动现有下载流程"
    exit_signal: "DownloadAsync(validUrl) 返回的 handler 由 OperationModule.Execute<T> 创建并启动，正常完成能唤醒等待者"
    status: done
  - action: "单文件终态映射：接通成功、失败、取消和进度映射"
    exit_signal: "成功映射 Succeeded，失败映射 Failed 且错误可读，取消映射 Cancelled 且 temp 清理不变"
    status: done
  - action: "暂停/恢复语义收口：暂停不完成 operation，恢复后继续同一 handler 和等待链路"
    exit_signal: "暂停不会唤醒 operation 等待者，恢复后最终完成/失败/取消会唤醒同一等待链路"
    status: done
  - action: "批量 operation 骨架：让 DownloadListHandler 作为 operation 执行顺序下载"
    exit_signal: "批量等待能在列表跑完后完成，子项结果仍从 Items 读取"
    status: done
  - action: "批量终态映射：接通部分失败继续但最终失败、显式取消、列表自身异常三类状态"
    exit_signal: "单项失败不阻断后续项，但列表最终 operation failed；列表取消映射 Cancelled"
    status: done
  - action: "验证覆盖：补齐正常、边界、错误和范围守护场景"
    exit_signal: "Runtime 编译通过，关键验收场景都有代码审查或测试证据"
    status: done
  - action: "下载错误 API 引用迁移：更新现有调用方对 DownloadHandler.Error 的使用"
    exit_signal: "Runtime 编译通过，现有调用方不再把 operation.Error 当 string 使用"
    status: done

checks:
  - item: "单文件下载句柄可以作为 OperationHandle 被等待；完成、失败、取消时 OperationStatus 可观察"
    source: 名词契约
    status: done
  - item: "批量下载句柄可以作为 OperationHandle 被等待；存在单项失败时列表 operation 最终按失败处理"
    source: 名词契约
    status: done
  - item: "下载公开状态统一使用 OperationStatus，Paused、Failed、Cancelled、Succeeded 等状态由 OperationHandle.Status 表达"
    source: 名词契约
    status: done
  - item: "下载错误不再维护独立 string Error 字段，直接使用 OperationHandle.Error"
    source: 名词契约
    status: done
  - item: "ResourceModule.ManifestOperationHandle 不再把 DownloadHandler.Error 当 string 使用"
    source: 名词契约
    status: done
  - item: "ProgressChanged、Completed、Failed、Canceled 等既有下载事件继续可用"
    source: 名词契约
    status: done
  - item: "同 URL 重复 DownloadAsync(url) 仍返回同一 DownloadHandler，不创建重复 operation 或重复网络请求"
    source: 流程级约束
    status: done
  - item: "暂停保留 temp / .part，不清理 handler，不唤醒 WaitCompletionAsync"
    source: 流程级约束
    status: done
  - item: "单项失败不阻断后续下载，但全部子项处理完后列表 operation 必须失败"
    source: 流程级约束
    status: done
  - item: "DownloadHandler : OperationHandle 挂载点存在，单文件下载句柄进入统一 operation 生命周期"
    source: 挂载点
    status: done
  - item: "DownloadListHandler : OperationHandle 挂载点存在，批量下载句柄进入统一 operation 生命周期"
    source: 挂载点
    status: done
  - item: "DownloadModule 的 DownloadAsync / DownloadListAsync 将 handler 交给 operation 入口执行"
    source: 挂载点
    status: done
  - item: "不把 OperationModule 改造成下载队列、限速器、重试器或调度器"
    source: 范围守护
    status: done
  - item: "不移除 DownloadFailureKind、下载事件或 WaitCompletionAsync 既有 API"
    source: 范围守护
    status: done
  - item: "不改变 DownloadModule 的 temp 下载目录、分片阈值、Range 续传、取消清理规则"
    source: 范围守护
    status: done
  - item: "不接入 FileModule、资源清单、版本比对、hash 校验、解压或热更新导入流程"
    source: 范围守护
    status: done
  - item: "不新增第三方依赖，不引入 UnityEditor API"
    source: 范围守护
    status: done
  - item: "N1: DownloadAsync(validUrl) 并等待 handler 后，handler OperationStatus.Succeeded，TempPath 文件存在"
    source: 验收场景
    status: done
  - item: "N2: 单文件下载过程中 DownloadHandler.Progress 增长，operation progress 观察面收到同一进度语义"
    source: 验收场景
    status: done
  - item: "N3: 单文件网络/HTTP/IO 失败时 handler Failed、FailureKind 可读、operation Failed、operation Error 非空"
    source: 验收场景
    status: done
  - item: "N4: 单文件取消时 handler Canceled、operation Cancelled，temp / .part 清理规则不变"
    source: 验收场景
    status: done
  - item: "N5: 同 URL 连续两次 DownloadAsync(url) 返回同一个 DownloadHandler"
    source: 验收场景
    status: done
  - item: "N6: DownloadListAsync(urlA, urlB) 两项成功时 list Completed，operation Succeeded，两项均 Completed"
    source: 验收场景
    status: done
  - item: "N7: 批量第一项失败、第二项成功时 list operation Failed，第一项 Failed，第二项 Completed"
    source: 验收场景
    status: done
  - item: "N8: 批量取消时 list Canceled，operation Cancelled，子项取消清理规则不变"
    source: 验收场景
    status: done
  - item: "B1: DownloadAsync(null) 或空 URL 仍抛参数异常，不创建 operation"
    source: 验收场景
    status: done
  - item: "B2: 暂停后恢复单文件下载时暂停不唤醒 operation 等待者，恢复后最终终态才唤醒等待者"
    source: 验收场景
    status: done
  - item: "B3: 失败后恢复单文件下载保留 temp / .part，可重新进入下载流程，不因旧 operation 终态阻塞"
    source: 验收场景
    status: done
  - item: "E1: 列表编排自身抛非预期异常时 list operation Failed，错误可读"
    source: 验收场景
    status: done
  - item: "E2: OperationModule 未注册或不可用时启动下载有明确失败语义，不静默丢失下载任务"
    source: 验收场景
    status: done
  - item: "E3: OperationModule shutdown 取消运行中 download operation 时，DownloadModule shutdown 仍负责 temp 清理"
    source: 验收场景
    status: done
