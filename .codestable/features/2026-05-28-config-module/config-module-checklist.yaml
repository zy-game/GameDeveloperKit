feature: 2026-05-28-config-module
created: 2026-05-28

steps:
  - action: "模块入口和配置设置骨架：实现 Super.Config、ConfigModule Startup/Shutdown、ConfigSettings 和 source registry。"
    exit_signal: "注册模块后可获取 Super.Config；没有 settings 时模块能启动且缓存为空。"
    status: done
  - action: "统一名词契约：实现 ConfigFormat、ConfigSourceDefinition、ConfigTable、ConfigKeyAttribute、IConfigSerializer 和 IConfigAsset。"
    exit_signal: "表名、row 类型、key field 和 serializer 契约能表达四种来源。"
    status: done
  - action: "加载编排骨架：实现 LoadTableAsync 的校验、pending single-flight、cache hit/miss 和 unload 流程。"
    exit_signal: "同名并发加载只走一次流程，缓存命中能返回同一表对象。"
    status: done
  - action: "文本来源 serializer：实现 JSON、CSV、XML 三个 serializer，并接入统一 row 列表输出。"
    exit_signal: "三种文本样例都能解析为相同 row 模型。"
    status: done
  - action: "ScriptableObject serializer：实现 SO asset 契约读取和 row 类型校验。"
    exit_signal: "实现 IConfigAsset 的 asset 能被加载为 ConfigTable。"
    status: done
  - action: "主键索引和错误路径：补齐 key field、ConfigKeyAttribute、重复 key、缺字段、类型转换失败、缺 source、缺 serializer、缺 asset 的错误语义。"
    exit_signal: "关键错误都包含 config name、format、location 或 row type。"
    status: done
  - action: "预加载和 Shutdown 清理：接通 ConfigSettings.Preload，补齐清理、重复 shutdown 和 unload 语义。"
    exit_signal: "preload 表启动后可直接查询；Shutdown 后缓存清空。"
    status: done
  - action: "验证覆盖：用 Runtime 编译验证覆盖四种 serializer、缓存、并发加载和错误路径。"
    exit_signal: "Runtime 编译通过，验收契约有可观察证据。"
    status: pending

