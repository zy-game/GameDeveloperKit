feature: 2026-05-27-ui-module
created: 2026-05-28

steps:
  - action: "结构拆分微重构：把 Runtime/UI/UIModule.cs 中混放的公开类型拆到各自文件，不改变行为语义。"
    exit_signal: "拆分后仍暴露 UIDocument、UIBindMapping、UILayer、UIOption、UIWindow、UIModule 同名类型。"
    status: done
  - action: "模块入口和 Canvas root：实现 Super.UI、UIModule.Startup、1920 x 1080 Canvas、UIRoot 与 layer 容器。"
    exit_signal: "注册 UIModule 后可获取 Super.UI，场景中存在稳定 CanvasScaler 和 Background/Main/Window/Loading/Message layer 节点。"
    status: done
  - action: "安全区骨架：实现 UIDocument full-screen root / safe-area root 语义与 safe area driver。"
    exit_signal: "背景 root 可保持全屏，safe area root anchors 能按 Screen.safeArea 刷新。"
    status: done
  - action: "名词契约补齐：补全 UIOption、UIDocument GameObject/组件绑定、UIWindow 生命周期和内部 record/stack。"
    exit_signal: "窗口类型能被校验，document 能按 key 查询 GameObject 和组件，窗口记录能表达打开状态。"
    status: done
  - action: "UIDocument Inspector 与代码生成：支持在 Inspector 选择组件，并生成 ExampleWindow / ExampleController / ExampleModule / ExampleModel。"
    exit_signal: "生成代码包含强类型组件字段和 ExampleModel 缓存，已存在 Controller 用户文件不被覆盖。"
    status: done
  - action: "OpenAsync 主流程：接入资源加载、prefab 实例化、安全区应用、一次性绑定、生命周期和重复打开 single-flight。"
    exit_signal: "有效窗口可打开，重复或并发打开不产生重复实例。"
    status: done
  - action: "关闭和清理编排：实现 Close、Switch、Back、Shutdown、释放顺序和主要错误路径残留清理。"
    exit_signal: "关闭释放资源，Switch 只影响目标 layer，Back 回到前一个可导航窗口，失败不留下半实例。"
    status: done
  - action: "验证覆盖：用编译或测试覆盖正常、边界、错误和范围守护场景。"
    exit_signal: "Runtime 编译通过，关键验收契约有可观察证据。"
    status: pending

