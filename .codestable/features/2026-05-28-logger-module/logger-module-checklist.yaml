feature: 2026-05-28-logger-module
created: 2026-05-28

steps:
  - action: "模块入口骨架：补 Super.Logger，让已注册 LoggerModule 能被访问，Startup/Shutdown 不再抛未实现"
    exit_signal: "注册 LoggerModule 后访问 Super.Logger 返回同一模块实例"
    status: done
  - action: "名词契约：定义 LogLevel、LogEntry、ILogSink、默认分类和过滤配置"
    exit_signal: "日志条目可以表达等级、分类、消息、异常和上下文"
    status: done
  - action: "sink 管理：实现添加、移除、去重、清空和 Unity Console 默认 sink"
    exit_signal: "自定义 sink 能接收日志，重复注册不重复接收"
    status: done
  - action: "日志主流程：实现便捷等级 API、过滤、条目创建和 sink 快照输出"
    exit_signal: "低于最小等级或禁用分类的日志不进入 sink，通过过滤的日志按顺序输出"
    status: done
  - action: "异常和 sink 失败路径：实现异常日志记录、非法等级校验、空值归一和 sink 抛异常保护"
    exit_signal: "记录异常不丢异常对象，sink 抛异常不会导致日志递归或模块崩溃"
    status: done
  - action: "验证覆盖：用 Runtime 编译和聚焦测试覆盖入口、等级过滤、分类过滤、sink 去重、异常日志、Shutdown 清理"
    exit_signal: "Runtime 快速编译通过，关键验收契约有可观察证据"
    status: pending

