  - action: "编译 report 接入：点击编译后把正式 StoryValidationReport 投影到 graph 和左侧 summary"
    exit_signal: "缺 command 字段、非法 choice selected、manual asset warning 都能定位到图上"
    status: done
  - action: "点击定位与 stale 状态：summary 项可选中 node/wire，并在图修改后标记旧编译结果过期"
    exit_signal: "点击问题后 graph selection 与 badge 保持一致；图修改后出现请重新编译确认提示"
    status: done
  - action: "测试与证据：补 EditorNodeGraphKit boundary、Story mapping、compiler issue 投影和 runtime/editor 隔离"
    exit_signal: "Editor.Tests / Runtime.Tests 构建通过；grep 仍确认 GraphKit 不含 Story 专有引用，runtime 不含 editor graph"
    status: done

