feature: 2026-06-01-tag-config-editor
created: 2026-06-01

steps:
  - action: "Runtime 名词契约：定义标签目录资产、group、tag 和只读快照模型"
    exit_signal: "不接 UI 时也能构造一份目录并通过只读 API 查询"
    status: done
  - action: "ConfigModule 编排骨架：在 Startup / Shutdown 接入标签目录加载和清理，公开查询 API"
    exit_signal: "缺失 Resources 资产时 ConfigModule 启动成功；存在合法资产时查询返回标签"
    status: done
  - action: "Editor 持久化与导入服务：创建 / 保存 Resources 资产，刷新 Asset Tags 与 Unity Tags"
    exit_signal: "保存后重开 Unity / 重开窗口，固定组和导入标签仍存在"
    status: done
  - action: "Tag Editor 静态 UI：落 UI Toolkit 窗口骨架，左侧 group、右侧 tag table、详情和问题区"
    exit_signal: "窗口打开后空状态、固定组、搜索框、保存 / 刷新操作可见"
    status: done
  - action: "CRUD 与校验：接入自定义组 / 标签增删改查、重复校验和固定组保护"
    exit_signal: "用户能完成新增、重命名、删除、搜索、保存、重开核对"
    status: done
  - action: "Unity 来源刷新收尾：处理 Unity tags 不可用、AssetDatabase labels 为空和重复导入"
    exit_signal: "刷新不会丢自定义标签，也不会制造重复导入标签"
    status: done
  - action: "Resource Editor 标签下拉联动：把资源条目标签候选改为读取 TagCatalog.asset 中所有非 unity-tags 组，保留 legacy 已选标签展示和当前资源写回"
    exit_signal: "Tag Editor 新增 / 保存标签后，Resource Editor 刷新即可在资源条目下拉中选择该标签；未登记但已存在的资源 label 可见且可取消"
    status: done
  - action: "验证覆盖：补 Runtime 配置加载测试、Tag Editor 手工验证清单和 Resource Editor 联动验证"
    exit_signal: "ConfigModule 运行时测试通过，Editor 打开 / 保存 / 刷新路径和 Resource Editor 标签候选联动有可观察证据"
    status: done

