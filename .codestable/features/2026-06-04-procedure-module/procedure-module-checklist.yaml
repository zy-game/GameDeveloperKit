feature: 2026-06-04-procedure-module
created: 2026-06-04

steps:
  - action: "模块入口和目录骨架：新增 Runtime/Procedure、ProcedureModule、ProcedureBase、ProcedureChangedEventArgs 和 Super.Procedure；将 ProcedureModule 接入 StartupInternal 默认计划且顺序在 UIModule 后；ProcedureRuntimeDriver 嵌套在 ProcedureModule 内"
    exit_signal: "Super.Startup 或手动注册 ProcedureModule 后可访问 Super.Procedure，Current 为空且 IsChanging 为 false"
    status: done
  - action: "注册表、懒创建与初始化：实现 RegisterProcedure、HasProcedure、TryGetProcedure、未注册目标的首次创建、重复注册校验和 OnInitializeAsync"
    exit_signal: "ChangeAsync<T>() 可自动创建无参 procedure；显式注册实例可按类型查询；重复注册同类型抛明确异常"
    status: done
  - action: "切换主流程：实现 ChangeAsync 的校验、leave / enter 串行编排、current 更新、no-op 和 ProcedureChanged"
    exit_signal: "从 A 切到 B 的回调顺序为 A leave -> B enter -> changed，Current 指向 B"
    status: done
  - action: "嵌套 RuntimeDriver 更新：Startup 创建 driver，Update 驱动当前 procedure，切换中跳过 update"
    exit_signal: "当前 procedure 每帧收到 deltaTime；离开的 procedure 不再收到 update"
    status: done
  - action: "错误与失败语义：补齐目标无法创建、重入、leave 失败、enter 失败、update 异常和 shutdown 异常路径"
    exit_signal: "失败场景都有确定 current 结果和可观察异常"
    status: done
  - action: "Shutdown 清理：离开当前 procedure、释放全部注册项、清空事件、销毁 driver，并保证重复 shutdown 安全"
    exit_signal: "Shutdown 后 current 为空、注册表为空、driver GameObject 被销毁"
    status: done
  - action: "验证覆盖：覆盖正常切换、no-op、重入、失败、update、shutdown 和范围守护"
    exit_signal: "dotnet build GameDeveloperKit.Runtime.csproj --no-restore 通过，关键验收契约有可观察证据"
    status: done

