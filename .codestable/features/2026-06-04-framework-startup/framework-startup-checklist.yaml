feature: 2026-06-04-framework-startup
created: 2026-06-04

steps:
  - action: "框架生命周期骨架：给 Super 增加启动状态、顺序记录和 Startup()/Shutdown() 空编排"
    exit_signal: "重复调用 Startup()/Shutdown() 不重复执行模块生命周期"
    status: done
  - action: "默认模块计划：按依赖顺序接入 Operation、Event、File、Download、Command、Logger、Resource、Config、Data、Timer、Sound、UI、Procedure"
    exit_signal: "启动后所有默认模块可通过 Super 或 TryGetValue 访问，Resource 前置依赖已存在"
    status: done
  - action: "失败与回滚：补齐启动失败后的反序清理和错误透传"
    exit_signal: "模拟某个中间模块启动失败时，之前启动的模块都执行 shutdown，模块表不残留半状态"
    status: done
  - action: "Unity 启动脚本：新增 Startup MonoBehaviour，把 Unity Start / quit / destroy 接到框架生命周期"
    exit_signal: "场景对象挂脚本后进入 Play 能自动启动，退出或销毁对象能触发一次 shutdown"
    status: done
  - action: "Timer 入口与兼容收口：补 Super.Timer，确认默认计划只注册 LoggerModule 而不是双注册 Debug/Logger"
    exit_signal: "Super.Debug 与 Super.Logger 指向同一 LoggerModule 实例，默认计划没有第二个 DebugModule"
    status: done
  - action: "验证覆盖：补充框架级启动、关闭顺序、重复调用、手动预注册、失败回滚和启动脚本桥接证据"
    exit_signal: "Runtime 快速编译通过，关键验收场景有测试或 Unity 运行证据"
    status: done

checks:
  - item: "不引入反射或 attribute 自动扫描模块，默认启动计划保持显式列表"
    source: "范围守护"
    status: pending
  - item: "不把业务自定义模块、第三方插件或场景管理流程纳入默认计划"
    source: "范围守护"
    status: pending
  - item: "不改变 ResourceModule 自己的 settings / manifest / package 错误语义；资源设置缺失仍由 ResourceModule 报错"
    source: "范围守护"
    status: pending
  - item: "不在默认计划里同时注册 LoggerModule 和 DebugModule 两个实例"
    source: "范围守护"
    status: pending
  - item: "不新增 Editor 菜单、安装向导或自动修改场景文件"
    source: "范围守护"
    status: pending
  - item: "Super 暴露框架级 Startup() 和 Shutdown() 公开 API"
    source: "名词契约"
    status: pending
  - item: "Super 暴露 TimerModule 的 Super.Timer 公开入口"
    source: "名词契约"
    status: pending
