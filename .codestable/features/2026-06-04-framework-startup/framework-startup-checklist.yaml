    source: "名词契约"
    status: pending
  - item: "默认模块计划按 OperationModule、EventModule、FileModule、DownloadModule、CommandModule、LoggerModule、ResourceModule、ConfigModule、DataModule、TimerModule、SoundModule、UIModule、ProcedureModule 顺序表达"
    source: "名词契约"
    status: pending
  - item: "Startup 启动脚本只桥接 Unity 生命周期，不维护模块依赖顺序"
    source: "编排骨架"
    status: pending
  - item: "Super.Startup 以固定列表顺序逐个注册默认模块"
    source: "编排骨架"
    status: pending
  - item: "Super.Startup 遇到已通过 Register<T>() 注册过的模块时不重复创建，并纳入 shutdown 顺序"
