feature: 2026-06-10-luban-config-editor
created: 2026-06-10

steps:
  - action: "工具骨架与 release 检测：建立窗口、settings、release path、version/help 检测和错误态"
    exit_signal: "窗口能显示本地 Luban 4.9.0 版本；路径错误时显示明确修复信息"
    status: done
  - action: "workspace 载入与创建：选择 luban.conf、创建默认目录骨架、结构化读取并保留未知字段"
    exit_signal: "没有 workspace 时能创建基础工程；已有 luban.conf 能读出常用字段并保存不丢未知字段"
    status: done
  - action: "generation profile 编辑：支持 target、code/data target、tags、variant、xargs、输出目录和命令预览"
    exit_signal: "修改 profile 后命令预览同步变化，并能持久化"
    status: done
  - action: "Luban check runner：执行 check 命令，捕获 stdout/stderr、退出码、耗时和错误摘要"
    exit_signal: "配置错误或数据错误能在窗口中显示，并可复制完整命令复现"
    status: done
  - action: "Luban generate runner：执行 generate 命令，成功后刷新 AssetDatabase，失败时保留旧输出并显示失败"
    exit_signal: "一个最小 workspace 能生成代码/数据到 profile 指定目录"
    status: done
  - action: "文件定位与编辑辅助：从窗口打开 luban.conf、schema/data 目录、输出目录"
    exit_signal: "用户能从 report 或 profile 一键定位相关文件"
    status: pending
  - action: "UI 和报告收尾：补齐 profile 列表、dirty 提示、取消运行、日志过滤、copy command 和空状态"
    exit_signal: "正常、缺 release、缺 workspace、运行失败、运行成功五种状态都可见"
    status: pending
  - action: "验证覆盖：用 Editor 编译 / EditMode tests 覆盖命令构造、settings 持久化、conf 保留未知字段和 runner 错误处理"
    exit_signal: "Editor 编译通过，关键验收场景有测试或可观察证据"
    status: pending

