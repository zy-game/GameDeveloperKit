    status: pending
  - item: "GetAssetAddress(name, version) 对旧 full key 输入不会拼出重复 channel/platform/version"
    source: 验收场景
    status: pending
  - item: "Runtime asmdef 不引用 ResourcePublisherSettings、IObjectStorageProvider、COS 类型或 provider registry"
    source: 范围守护
    status: pending
  - item: "ResourceSettings.asset 不出现 platform、publish version、SecretId 或 SecretKey 明文"
    source: 范围守护
    status: pending
  - item: "Inspector 应用 channel 不执行上传、删除远端对象或设置 current"
