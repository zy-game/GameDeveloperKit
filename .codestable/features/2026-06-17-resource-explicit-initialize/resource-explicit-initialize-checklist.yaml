feature: 2026-06-17-resource-explicit-initialize
created: 2026-06-17

steps:
  - action: "状态契约骨架：新增 ResourceInitializeState、ResourceInitializeOptions、状态属性和 InitializeAsync / UninitializeAsync 空壳"
    exit_signal: "未初始化 Resource 外壳可观察到 NotInitialized"
    status: done
  - action: "初始化编排：接通 settings 解析、InitializeOperationHandle、mode 创建、builtin/default package 初始化"
    exit_signal: "传入本地 manifest settings 可完成 InitializeAsync 并进入 Initialized"
    status: done
  - action: "幂等与失败处理：补初始化中复用、已初始化直接返回、失败回滚和失败后重试"
    exit_signal: "重复初始化不重复创建，失败不残留半 ready 状态"
    status: done
  - action: "反初始化与 shutdown 收口：实现 UninitializeAsync，让 Shutdown 同步清空状态"
    exit_signal: "初始化后可显式回到 NotInitialized，未初始化 API 恢复明确报错"
    status: done
  - action: "测试补齐：覆盖未初始化错误、成功初始化、重复初始化、失败重试、显式反初始化"
    exit_signal: "Runtime.Tests 覆盖状态机最小闭环"
    status: done
  - action: "编译验证：运行 Runtime 与 Runtime.Tests 快速编译"
    exit_signal: "dotnet build GameDeveloperKit.Runtime.csproj --no-restore 与 dotnet build GameDeveloperKit.Runtime.Tests.csproj --no-restore 均通过，或记录不可运行原因"
    status: done

