feature: 2026-06-19-story-module
created: 2026-06-19

steps:
  - action: "Core 时间线基类：建立 TimelineBase 的最小时间轴契约"
    exit_signal: "派生类能通过 Seek/Evaluate 设置当前时间并触发 OnEvaluate，基类没有 Timer / Config / Data / Procedure / Resource / Localization / Editor 依赖"
    status: done
  - action: "Story 定义模型：建立 story/chapter/unit/node/port/transition/action/interaction/condition/snapshot 形状"
    exit_signal: "能用纯内存对象描述一个章节、一个剧情单元、视频节点、定时选项、小游戏结果和结尾"
    status: done
  - action: "Definition registry 与校验：实现注册表和跨 chapter/unit/node 的引用校验"
    exit_signal: "合法 definition 可注册；重复 id、缺失 target、非法 trigger time、缺失 outcome port 被拒绝并带定位"
    status: done
  - action: "Timeline 执行状态机：实现 start、进入 chapter/unit/node、transition、completed 和 loop guard"
    exit_signal: "entry chapter 能进入 unit start；jump 能立即跳转；纯空转循环会被 guard 拦截"
    status: done
  - action: "Action / interaction 编排：实现 action request、required pending、timed interaction activation、select 和 external outcome"
    exit_signal: "视频节点 Evaluate(time) 到触发点后出现选项；小游戏节点等待外部 success/fail 后进入对应分支"
    status: done
  - action: "Condition resolver：接入条件求值和缺 resolver 错误语义"
    exit_signal: "条件通过时 interaction 可用，条件失败时不可选择，缺 resolver 时抛明确错误"
    status: done
  - action: "Snapshot / restore 与可观测点：实现状态快照、本地事件和恢复失败回滚"
    exit_signal: "Restore(CreateSnapshot()) 后位置、时间、active/pending、history 一致；节点变化和 action request 可被订阅"
    status: done
  - action: "验证覆盖：补齐 Core、注册校验、执行流、条件、外部 outcome、snapshot 和范围守护"
    exit_signal: "关键验收场景都有自动测试或可复核证据，且不需要启动 Config/Data/Procedure/Resource/Localization"
    status: done

