steps:
  - action: "manifest 查询补齐：实现 ManifestInfo.GetBundle 和 GetDependencies"
    exit_signal: "给定包含依赖的 manifest，可按 bundle 名取到 bundle 和依赖列表"
    status: done
  - action: "package operation 补齐：实现 InitializePackageOperationHandle / UninitializePackageOperationHandle 对 provider 列表的创建、初始化、移除"
    exit_signal: "初始化失败不注册 provider，反初始化能释放并移除目标 provider"
    status: done
  - action: "bundle operation 补齐：实现 InitializeBundleOperationHandle 加载 AssetBundle 并生成 BundleHandle"
    exit_signal: "有效路径得到成功 operation，无效路径得到可观察失败"
    status: done
  - action: "loading operation 补齐：实现 asset/raw/scene 三类 loading operation"
    exit_signal: "BundleProvider 的三类加载方法能返回成功或失败 handle"
    status: done
  - action: "mode/provider 批量与卸载修正：修正 label/raw label 批量调用、handle 缓存和 package 归属判断"
    exit_signal: "批量加载语义正确，重复加载复用 handle，package 判断不混淆 bundle 名"
    status: done
  - action: "验证覆盖：编译并覆盖成功、查无资源、bundle 加载失败、重复初始化、反初始化"
    exit_signal: "Runtime 编译通过，BundleMode 主链路不再依赖空 operation"
    status: done

