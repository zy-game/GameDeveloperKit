feature: 2026-06-17-app-sync-module-resolver
created: 2026-06-17

steps:
  - action: "App resolver 骨架：把 App.Event/App.Resource/App.Timer 改成 GetModule<T>()，并接通注册表查找"
    exit_signal: "同步属性可以在未预加载时直接返回模块外壳"
    status: done
  - action: "依赖递归：读取 [ModuleDependency]，先启动依赖再启动目标模块"
    exit_signal: "App.Event 自动带起 TimerModule，App.Resource 自动带起其依赖链"
    status: done
  - action: "循环与失败处理：实现循环依赖检测、重复获取幂等和失败回滚"
    exit_signal: "循环依赖抛 GameException，失败不留下半注册模块"
    status: done
  - action: "启动入口清理：移除 StartupInternal 固定默认模块列表，收口 TryGetValue 裸创建"
    exit_signal: "StartupInternal 不再包含 RegisterDefault 列表，TryGetValue 只返回已注册模块"
    status: done
  - action: "测试迁移与补齐：把依赖默认预加载的测试改为显式 resolver 语义验证"
    exit_signal: "Runtime.Tests 覆盖最小闭环、循环依赖和反序关闭"
    status: done
  - action: "编译验证：运行 Runtime 与 Runtime.Tests 快速编译"
    exit_signal: "dotnet build GameDeveloperKit.Runtime.csproj --no-restore 与 dotnet build GameDeveloperKit.Runtime.Tests.csproj --no-restore 均通过，或记录不可运行原因"
    status: done

