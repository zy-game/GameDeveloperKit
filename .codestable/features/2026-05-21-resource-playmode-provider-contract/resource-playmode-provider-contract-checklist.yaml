  - action: "验证覆盖：用 fake provider/playmode 验证契约形态，用单测验证 PackageOperationHandle 行为"
    exit_signal: "契约编译通过，operation handle 正常 / 失败 / 释放 / 非法参数都有证据"
    status: done

