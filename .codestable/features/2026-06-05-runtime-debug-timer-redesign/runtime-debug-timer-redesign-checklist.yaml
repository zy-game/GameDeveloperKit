feature: 2026-06-05-runtime-debug-timer-redesign
created: 2026-06-05

steps:
  - action: "行为不变的目录重组：把现有 Debug 相关文件从 Runtime/Logger 移入 Runtime/Debug，并按 Logs/Console/Metrics/Tools/Transports 分组"
    exit_signal: "不改公开行为，Runtime 快速编译和现有调试聚焦测试仍能通过"
    status: done
  - action: "Debug 唯一入口与非目标能力收口：删除 LoggerModule、App.Logger 和 Logger 命名引用，默认启动计划直接注册 DebugModule；删除或隔离 upload/bundle/uploader 公开面，不新增 rolling file 或本地日志存储"
    exit_signal: "代码中不再有 LoggerModule 或 App.Logger 公开入口，App.Debug 返回已注册 DebugModule；Debug 公开 API 不包含上传包，日志不会写入本地文件"
    status: done
  - action: "Timer Clock 骨架：修正 Time/delta/tick 语义，补 shutdown 幂等和 driver 空值保护"
    exit_signal: "Timer startup 后 tick/time 单位可观察，重复 shutdown 不抛异常"
    status: done
  - action: "Timer Delay/Countdown/Interval：实现延时执行、倒计时、循环间隔、取消、暂停/恢复、owner/tag 和快照"
    exit_signal: "Delay 到点执行一次，Countdown 暴露剩余时间和完成状态，Interval 可循环并可取消"
    status: done
  - action: "ProfileHandle 框架：实现 profile registry、列/行模型、刷新间隔、错误隔离和注册/移除 API"
    exit_signal: "自定义 ProfileHandle 注册后能在 Debug 中查询到一张 table"
    status: done
  - action: "日志 pipeline 收口：保留现有日志函数，接入 Unity log capture、frame/tick enrich、redaction、O(1) ring buffer 和可选 realtime transport"
    exit_signal: "框架日志和 Unity 日志进入同一内存查询视图，且不会递归重复；未配置 transport 时 no-op"
    status: done
  - action: "全屏 Console：实现全屏 IMGUI Console、Close 按钮、Logs/Profiles/Timers/Tools/Settings tabs"
    exit_signal: "Console 可全屏打开和关闭，关闭后不绘制；Profiles tab 能展示注册表格"
    status: done
  - action: "启动与安全收口：调整默认启动顺序，补 Release 默认关闭和敏感字段反向核对"
    exit_signal: "App.Startup 后 Timer 早于 Debug，Release 默认不启用危险能力"
    status: done

