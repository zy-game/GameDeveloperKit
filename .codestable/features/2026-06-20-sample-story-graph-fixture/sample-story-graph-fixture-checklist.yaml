feature: 2026-06-20-sample-story-graph-fixture
created: 2026-06-20

steps:
  - action: "微重构：拆出 sample fixture helper，集中 canonical StoryAuthoringAsset 构造和预期 ID/数量"
    exit_signal: "StoryEditorTests 不新增大段 node/edge 构造重复代码；helper 可被 CSV、compiler、window 测试复用"
    status: done
  - action: "样例拓扑定型：确定 story、volume、chapter、node、edge、parameter、condition、layout 的 canonical 数据"
    exit_signal: "纸面拓扑覆盖目标节点种类，且每章从 Start 到 End 或 JumpChapter 有清晰路径"
    status: done
  - action: "Fixture builder：用代码构造 canonical StoryAuthoringAsset，避免手写 Unity serialized asset"
    exit_signal: "builder 生成的 asset authoring validation 无 error，章节、节点和边 ID 稳定"
    status: done
  - action: "CSV v3 样例接通：让 canonical fixture 可导出为 CSV v3，并能从 CSV 导入回同等关键结构"
    exit_signal: "round-trip 后 storyId、volume entry、chapter ids、node ids、edge ids、parameters、conditions、layout 关键值一致"
    status: done
  - action: "Compiler/runtime smoke：把样例编译成 StoryProgram 并注册、推进代表路径"
    exit_signal: "compiler 无 error；runtime 能输出 line、choice、command、wait，并能通过 Select/CompleteCommand 继续"
    status: done
  - action: "Editor 手测样例：用 Story Editor 打开 canonical fixture，记录章节树、节点布局、字段和 diagnostics 状态"
    exit_signal: "手测记录说明每章可打开、布局可读、无 error、选项/命令/条件字段在节点上可见"
    status: done
  - action: "文档与回归收口：把样例用途写入 acceptance，并视实现结果回填 requirement/architecture"
    exit_signal: "后续验收知道从哪里打开样例、跑哪些测试、哪些范围不属于 fixture"
    status: done

