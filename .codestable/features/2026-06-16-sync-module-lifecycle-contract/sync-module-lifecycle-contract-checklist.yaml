feature: 2026-06-16-sync-module-lifecycle-contract
created: 2026-06-16

steps:
  - action: "Core 契约骨架：将 IGameModule / GameModuleBase 改为同步 Startup()/Shutdown()，并同步 Release()"
    exit_signal: "Core 中不再引用 Cysharp.Threading.Tasks 仅服务模块生命周期"
    status: done
  - action: "App 过渡接线：让现有注册、默认启动、关闭、回滚调用同步模块生命周期，并保留 App 级 UniTask 外壳"
    exit_signal: "App 内不再 await module.Startup()/module.Shutdown()，但 await App.Startup() 仍可编译"
    status: done
  - action: "轻量模块签名迁移：迁移 Timer、Event、Operation、Command、Data、Debug、Combat 等同步逻辑模块"
    exit_signal: "这些模块生命周期不再返回 UniTask.CompletedTask，重复 startup/shutdown 行为保持"
    status: done
  - action: "含 await 模块过渡迁移：处理 Resource、File、Download、Procedure、UI、Sound、Network 的生命周期异步边界"
    exit_signal: "模块生命周期内无 await 且不阻塞 async，被迁出的 ready/cleanup 有明确边界"
    status: done
  - action: "测试调用迁移：把直接模块生命周期调用从 await/getawaiter 改为同步调用，保留 App 级 await 调用兼容"
    exit_signal: "测试源码不再对 module.Startup()/module.Shutdown() 使用 await 或 .GetAwaiter()"
    status: done
  - action: "编译验证：运行 Runtime 快速编译并修正签名连锁错误"
    exit_signal: "dotnet build GameDeveloperKit.Runtime.csproj --no-restore 通过，或记录不可运行原因"
    status: done

checks:
  - item: "不新增依赖 attribute、不读取 attribute、不做依赖递归加载"
    source: "范围守护"
    status: passed
  - item: "不改变 App.Event / App.Resource 等属性的未注册时报错语义"
    source: "范围守护"
    status: passed
  - item: "不移除 App 默认模块预加载列表和 Runtime Startup.cs"
    source: "范围守护"
    status: passed
  - item: "同步 Startup()/Shutdown() 里不使用 .GetAwaiter().GetResult()、.Wait() 或 UniTask.ToCoroutine() 阻塞异步任务"
    source: "范围守护"
    status: passed
  - item: "不把 Resource InitializeAsync 完整状态机作为本 feature 的主要产物"
    source: "范围守护"
    status: passed
  - item: "IGameModule 暴露 void Startup() / void Shutdown()"
    source: "名词契约"
    status: passed
  - item: "GameModuleBase 暴露 abstract void Startup() / abstract void Shutdown()"
    source: "名词契约"
    status: passed
  - item: "IReference.Release() 同步调用 Shutdown()，不再 fire-and-forget"
    source: "名词契约"
    status: passed
  - item: "所有 GameModuleBase 实现都使用 override void Startup()/Shutdown()"
    source: "名词契约"
    status: passed
  - item: "App.Register<T>() 创建模块后同步调用 module.Startup() 并记录顺序"
    source: "编排骨架"
    status: passed
  - item: "App.Unregister<T>() 移除模块后同步调用 module.Shutdown()"
    source: "编排骨架"
    status: passed
  - item: "App.StartupInternal() 默认列表暂时保留，只是不再等待模块生命周期"
    source: "编排骨架"
    status: passed
  - item: "App.ShutdownRegisteredModules() 仍按 _moduleOrder 反序关闭，并捕获首个同步异常"
    source: "编排骨架"
    status: passed
  - item: "同步 Startup() 抛异常时，App 清理本次已注册模块并透传原异常"
    source: "流程级约束"
    status: passed
  - item: "同步 Shutdown() 抛异常时，App 继续关闭剩余模块并最终抛首个异常"
    source: "流程级约束"
    status: passed
  - item: "已有重复 startup/shutdown no-op 行为不倒退"
    source: "流程级约束"
    status: passed
  - item: "模块生命周期签名迁移挂载点存在于 Core、Runtime 模块和 App 生命周期编排"
    source: "挂载点"
    status: passed
  - item: "N1: IGameModule 契约中 Startup()/Shutdown() 均为 void，Release() 同步调用 Shutdown()"
    source: "验收场景"
    status: passed
  - item: "N2: Runtime 模块实现中不存在 override UniTask/async UniTask Startup/Shutdown"
    source: "验收场景"
    status: passed
  - item: "N3: await App.Register<TimerModule>() 仍可编译，内部同步启动 TimerModule，App.Timer 可访问"
    source: "验收场景"
    status: passed
  - item: "N4: 直接创建 TimerModule 并同步调用 Startup()/Shutdown() 可编译，重复启动/关闭仍不抛异常"
    source: "验收场景"
    status: passed
  - item: "N5: EventModule.Startup() 在 Timer 已注册时仍能注册 Timer update 派发 handle"
    source: "验收场景"
    status: passed
  - item: "N6: ResourceModule.Startup() 不在生命周期内 await manifest/default package 初始化"
    source: "验收场景"
    status: passed
  - item: "N7: FileModule.Startup() 不阻塞等待 VfsManifest.LoadAsync()，公开 API 不在 manifest 未 ready 时空引用崩溃"
    source: "验收场景"
    status: passed
  - item: "N8: ProcedureModule.Shutdown() 不阻塞等待 OnLeaveAsync()，完整离开由显式流程承担"
    source: "验收场景"
    status: passed
  - item: "N9: App.Shutdown() 关闭多个模块且某个 Shutdown() 抛异常时继续关闭剩余模块并最终抛首个异常"
    source: "验收场景"
    status: passed
  - item: "B1: 测试源码中不再直接 await module.Startup()/Shutdown() 或调用其 GetAwaiter()"
    source: "验收场景"
    status: passed
  - item: "B2: App 内部不存在 await module.Startup() / await module.Shutdown()"
    source: "验收场景"
    status: passed
  - item: "E1: 实现中未出现用 .GetAwaiter().GetResult() 或 .Wait() 适配同步生命周期"
    source: "验收场景"
    status: passed
  - item: "E2: 本 feature 未新增 ModuleDependency 或 App.GetModule<T>() resolver"
    source: "验收场景"
    status: passed
