feature: 2026-05-26-builtin-editor-provider-loading
created: 2026-05-26

steps:
  - action: "Builtin asset/raw operation：补齐 Resources.Load 与 TextAsset.bytes 两条无 scene 争议路径"
    exit_signal: "给定以 Resources/ 开头的 AssetInfo.Location，asset/raw 成功返回有效 handle；无效路径或缺少前缀返回 failed handle"
    status: done
  - action: "Editor bundle lifecycle：补齐无真实 AssetBundle 的 initialize/uninitialize 占位成功语义"
    exit_signal: "EditorProvider.InitializeBundleOperationHandle / UninitializeBundleOperationHandle 行为和 BuiltinProvider 一致，不再因 NotImplementedException 或缺少真实 AssetBundle 失败"
    status: done
  - action: "Editor asset/raw operation：在 UNITY_EDITOR 分支接入 AssetDatabase，非 Editor 分支返回明确失败"
    exit_signal: "Editor 编译中可加载 Assets/... 路径资源；runtime 非 Editor 编译无 UnityEditor 未隔离引用"
    status: done
  - action: "scene operation 决策落地：实现 additive scene load 或明确失败"
    exit_signal: "scene 行为与 design 第 1 节决策一致，失败时错误可读"
    status: done
  - action: "缓存与批量路径核对：确保加载成功 handle 只加入一次缓存，label/type 批量加载不漏掉成功项"
    exit_signal: "重复加载复用 handle，label/type 批量返回命中集合，不产生重复缓存"
    status: done
  - action: "验证覆盖：编译、grep UnityEditor 隔离、覆盖成功/空路径/未找到/非 Editor 分支"
    exit_signal: "Runtime 编译通过，关键场景都有可观察证据"
    status: done

