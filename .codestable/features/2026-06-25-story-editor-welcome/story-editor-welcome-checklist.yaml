steps:
  - action: "静态结构：创建 StoryEditorWelcomeWindow 窗口类 + USS 布局文件，放置静态内容（引导文字占位、新建/打开/示例按钮、最近资源区域占位），按钮暂不绑定行为"
    exit_signal: "菜单点击后看到欢迎窗口，窗口布局与 design 描述一致（深色主题、引导区、按钮区、最近资源区）"
    status: passed

  - action: "交互逻辑：实现 StoryEditorRecentAssets 辅助类（EditorPrefs JSON 读写），实现按钮行为（新建弹出保存对话框、打开弹出文件选择对话框、示例调用 StoryEditorWindow.OpenSample()），实现 StoryEditorWindow.Open(string assetPath) 重载"
    exit_signal: "点击新建/打开能弹出正确的文件对话框；点击示例能打开编辑器窗口并加载示例剧情；EditorPrefs 键值正确读写"
    status: passed

  - action: "最近资源：实现最近列表的 UI 渲染（按时间倒序）、资源有效性校验（灰显无效条目）、点击打开行为、去重与上限裁剪"
    exit_signal: "打开一个资源后关闭编辑器，重新打开欢迎页能看到该资源排在列表最前；重复打开同一资源不重复出现；超过 10 条被裁剪；已删除资源灰显且点击有提示"
    status: passed

  - action: "联调收尾：将菜单项 [MenuItem] 绑定从 StoryEditorWindow 迁移到 StoryEditorWelcomeWindow，确保从欢迎页进入编辑器后编辑器所有功能行为不变"
    exit_signal: "所有验收场景 N1-N13 手动通过，编辑器节点编辑/编译/播放功能不受影响"
    status: passed

