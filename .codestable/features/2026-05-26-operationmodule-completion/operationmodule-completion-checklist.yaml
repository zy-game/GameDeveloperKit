feature: 2026-05-26-operationmodule-completion
created: 2026-05-26

steps:
  - action: "编排骨架：建立 running operation 索引和参数校验"
    exit_signal: "Execute 使用 key 登记 operation，非法 key / operation 有明确异常"
    status: done
  - action: "状态节点：补齐 OperationHandle 状态进入、终态判断和等待完成后的清理"
    exit_signal: "成功 / 失败 / 取消后 operation 不再残留在索引中"
    status: done
  - action: "外部回写：实现 SetResult / SetException / SetCanceled"
    exit_signal: "外部按 key 完成 operation 后，等待者能观察到对应终态"
    status: done
  - action: "生命周期清理：实现 Shutdown 取消并清空运行中 operation"
    exit_signal: "模块关闭后没有 running operation 残留，等待者观察到取消"
    status: done
  - action: "验证覆盖：补关键正常、边界、错误场景"
    exit_signal: "Runtime 编译通过，operation module 的 key 回写、重复 key、关闭清理都有证据"
    status: done

