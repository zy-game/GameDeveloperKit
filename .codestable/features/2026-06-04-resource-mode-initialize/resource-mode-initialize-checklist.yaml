feature: 2026-06-04-resource-mode-initialize
created: 2026-06-05

steps:
  - action: "编排骨架：把 ResourceModule 启动清单读取拆成按 ResourceSettings.Mode 分支的 source router"
    exit_signal: "四种 mode 都能得到确定的 manifest source；EditorSimulator / Offline 不进入 publish pointer；Online / Web 先拿 publish version 再拿 manifest"
    status: done
  - action: "Editor 反射节点：接通 Resource Editor 配置到内存 ManifestInfo provider"
    exit_signal: "进入 Play 且 Mode 为 EditorSimulator 时，Runtime 反射得到非空 ManifestInfo，项目目录不新增 manifest 文件"
    status: done
  - action: "Runtime mode 注册：重建 modes 初始化规则，只注册 Builtin 补充 mode 和 selected mode"
    exit_signal: "modes 不包含 null；Offline 不重复注册两个 StreamingAssetMode；unsupported mode 有明确错误"
    status: done
  - action: "Builtin 与默认 package 初始化：让 BUILTIN 按 manifest 声明可选初始化，默认 package 走 selected mode"
    exit_signal: "无 BUILTIN bundle 的 manifest 不阻断默认 package；缺失 default package 有明确 package 名错误"
    status: done
  - action: "错误与日志收口：补齐 mode / location / package 名相关错误语义和启动日志"
    exit_signal: "关键失败路径能从异常消息定位是清单、publish pointer、mode、provider 还是 package"
    status: done
  - action: "验证覆盖：按四种 mode、Editor 反射 provider、缺失文件、缺失 publish version、缺失 package 做可观察验证"
    exit_signal: "第 3 节验收契约均有证据，且 Runtime asmdef 没有 Editor-only 编译期引用"
    status: done

