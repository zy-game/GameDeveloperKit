steps:
  - action: "编辑器外壳与 authoring asset：建立菜单、窗口和 input action source document"
    exit_signal: "能创建 / 打开 asset，并保存空 maps 与生成设置"
    status: pending
  - action: "map/action 静态编辑：搭建 map/action 树和详情面板"
    exit_signal: "能新增、重命名、删除 map/action，并保存 enabled 默认值"
    status: pending
  - action: "binding 编辑：补齐 Key、MouseButton、Axis 三类 binding 的编辑控件"
    exit_signal: "能描述 Space 跳跃、mouse button 攻击、Horizontal axis 移动"
    status: pending
  - action: "validator 与 report：按 runtime 输入规则校验 authoring 数据"
    exit_signal: "空名、重复、非法 mouse button、空 axis 和非法输出路径能定位到具体元素"
    status: pending
  - action: "factory generator：生成可创建 InputActionMap 的 .g.cs 文件"
    exit_signal: "生成代码可编译，调用 CreateMaps 后能得到与 asset 数量和名称一致的 maps/actions/bindings"
    status: pending
  - action: "验证覆盖：补齐 editor model、validator、generator 和范围守护"
    exit_signal: "Editor / Runtime 快速编译通过，关键验收场景有自动测试或手工证据"
    status: pending

