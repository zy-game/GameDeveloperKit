feature: 2026-06-04-combat-module
created: 2026-06-04

steps:
  - action: "模块入口与目录骨架：新增 Runtime/Combat、CombatModule、World 和 App.Combat，先建立默认 world 生命周期和 Shutdown 清理"
    exit_signal: "App.Register<CombatModule>() 后可访问 App.Combat.World，Shutdown 可清理默认 world"
    status: done
  - action: "World 固定帧率时钟与实体组件门面：接入内部 MassiveWorld，实现 FrameRate / FixedDeltaTime / Tick / Time / Update(deltaTime) / Step，以及 Entity class 句柄、Create / Destroy / AddComponent / RemoveComponent / HasComponent / GetComponent"
    exit_signal: "world 能按固定帧率累计 delta 并推进 Tick；combat Entity class 可以创建、持有 ComponentBase 组件对象、读取组件、销毁并反映 alive 状态"
    status: done
  - action: "Queryable 与系统基类：实现 ComponentBase、Queryable、SystemBase.Query 默认全量匹配和 Initialize 入口"
    exit_signal: "派生系统可声明 new Queryable(typeof(Health)) 条件，未重写 Query 时默认匹配所有 alive entity"
    status: done
  - action: "SystemManager 匹配生命周期：实现 Add / Remove、Queryable 到 Massive Filter / Query 的条件缓存，以及基于实体变更前后匹配差异的 OnCreate / OnDestroy 条件触发"
    exit_signal: "组件变化能让实体进入 / 离开系统匹配集合，回调只触发一次"
    status: done
  - action: "系统 Update 驱动：CombatModule runtime driver 调用 World.Update(deltaTime)，World.Step 按注册顺序通过 massive query 调用 OnUpdate"
    exit_signal: "只有当前匹配 entities 收到 OnUpdate，离开或销毁实体不再更新"
    status: done
  - action: "Rollback 与清理：World 包装 SaveFrame / Rollback，并在 rollback 后重建 EntityManager 句柄缓存和 SystemManager 生命周期匹配；Shutdown / Dispose 清理系统和实体"
    exit_signal: "rollback 后系统生命周期回调与 massive world 当前匹配状态一致，重复清理安全"
    status: done
  - action: "验证覆盖：覆盖模块注册、实体组件、include/exclude、OnCreate/OnDestroy/OnUpdate、销毁、rollback、范围守护"
    exit_signal: "dotnet build GameDeveloperKit.Runtime.csproj --no-restore 通过，关键验收契约有测试或可观察证据"
    status: done

