feature: 2026-06-04-combat-module
created: 2026-06-04

steps:
  - action: "模块入口与目录骨架：新增 Runtime/Combat、CombatModule、World 和 Super.Combat，先建立默认 world 生命周期和 Shutdown 清理"
    exit_signal: "Super.Register<CombatModule>() 后可访问 Super.Combat.World，Shutdown 可清理默认 world"
    status: done
  - action: "World 固定帧率时钟与 EntityManager：接入内部 MassiveWorld，实现 FrameRate / FixedDeltaTime / Tick / Time / Update(deltaTime) / Step，以及 Entity class 句柄、Create / Destroy / Set / Add / Remove / Has / Get"
    exit_signal: "world 能按固定帧率累计 delta 并推进 Tick；combat Entity class 可以创建、持有 ComponentBase 组件对象、读取组件、销毁并反映 alive 状态"
    status: done
  - action: "ComponentType 与系统基类：实现 ComponentBase、ComponentType、SystemBase 默认 Include / Exclude 和 Initialize 入口"
    exit_signal: "派生系统可声明 ComponentType.Of<T>() 条件，未重写条件时 Include / Exclude 为空"
    status: done
  - action: "SystemManager 匹配生命周期：实现 Add / Remove / Refresh / Rebuild、active set 和 OnCreate / OnDestroy 条件触发"
    exit_signal: "组件变化能让实体进入 / 离开系统匹配集合，回调只触发一次"
    status: done
  - action: "系统 Update 驱动：CombatModule runtime driver 调用 World.Update(deltaTime)，World 按固定步触发 SystemManager，SystemManager 按注册顺序调用 OnUpdate"
    exit_signal: "只有 active entities 收到 OnUpdate，离开或销毁实体不再更新"
    status: done
  - action: "Rollback 与清理：World 包装 SaveFrame / Rollback，并在 rollback 后重建 EntityManager 句柄缓存和 SystemManager 匹配集合；Shutdown / Dispose 清理系统和实体"
    exit_signal: "rollback 后系统 active set 与 massive world 当前组件集合一致，重复清理安全"
    status: done
  - action: "验证覆盖：覆盖模块注册、实体组件、include/exclude、OnCreate/OnDestroy/OnUpdate、销毁、rollback、范围守护"
    exit_signal: "dotnet build GameDeveloperKit.Runtime.csproj --no-restore 通过，关键验收契约有测试或可观察证据"
    status: done

