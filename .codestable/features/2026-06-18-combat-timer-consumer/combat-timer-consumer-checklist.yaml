    source: 范围守护
    status: passed
  - item: "不新增多 world 全局调度、系统分组、网络锁步、回滚同步或表现同步"
    source: 范围守护
    status: passed
  - item: "Timer FixedUpdate 推进后默认 world 收到 update"
    source: 验收场景
    status: passed
