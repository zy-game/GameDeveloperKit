feature: 2026-06-18-combat-timer-consumer
created: 2026-06-18

steps:
  - action: "编排骨架：让 CombatModule 声明 TimerModule 依赖并保存 fixed update handle"
    exit_signal: "App.Register<CombatModule>() 后 Timer 已注册，Combat update handle 出现在 Timer snapshot"
    status: done
  - action: "驱动迁移：把默认 world update 接到 Timer FixedUpdate handle"
    exit_signal: "推进 Timer FixedUpdate 后默认 world 按 delta 累积并产生固定步 tick"
    status: done
  - action: "Runtime driver 收口：移除 CombatRuntimeDriver 和 CombatRoot 创建/销毁路径"
    exit_signal: "反射确认 CombatModule 不再声明嵌套 driver，startup 后不存在 Combat root"
    status: done
  - action: "测试覆盖：补 Combat 与 Timer 接线相关测试并更新旧 root 断言"
    exit_signal: "Combat tests 覆盖依赖启动、FixedUpdate 驱动、Update/LateUpdate 不驱动、shutdown 取消和无独立 driver"
    status: done
  - action: "验证与回写：跑 Runtime / Tests 快速编译，完成 acceptance 回写"
    exit_signal: "编译通过，checklist checks 全部 passed，roadmap item 标记 done"
    status: done

