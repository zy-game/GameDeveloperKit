feature: 2026-06-01-resource-build-publish
created: 2026-06-02
status: superseded
superseded_by: 2026-06-02-resource-publisher/resource-publisher-checklist.yaml
note: "发布/COS/渠道/版本回滚步骤已被独立 Resource Publisher 方案取代；后续不要继续按本清单实现上传逻辑。"

steps:
  - action: "构建/发布配置模型：扩展资源编辑器项目设置，保存 build 和 publish 配置，但不保存密钥"
    exit_signal: "关闭重开窗口后输出路径、构建目标、COS region/bucket/prefix 仍存在，密钥字段没有进入项目文件"
    status: done
  - action: "构建计划边界：让 ResourceBuildStrategy 从收集预览生成可检查的 ResourceBuildPlan"
    exit_signal: "不调用 SBP 也能预览当前 package 会生成哪些 bundle 和包含哪些资源"
    status: done
  - action: "SBP 构建执行：接入 ContentPipeline.BuildAssetBundles 或兼容构建入口，输出 AssetBundle"
    exit_signal: "配置有效时生成 bundle 文件；配置错误时得到窗口可见错误"
    status: done
  - action: "manifest 和构建报告：从构建产物写出 ManifestInfo JSON 和 ResourceBuildResult"
    exit_signal: "manifest 中 hash/size/crc/dependencies 非占位，且能被现有运行时类型反序列化"
    status: done
  - action: "编辑器 UI 接入：新增 Build / Publish / Cancel、构建设置区、构建结果窗口和上传结果列表"
    exit_signal: "构建和上传的状态、进度、错误都不依赖 Console 才能看见"
    status: done
  - action: "COS 上传适配：读取本机凭证来源，基于最后一次 build result 生成 publish plan 并上传"
    exit_signal: "凭证缺失时 Publish 禁用或给出明确错误；凭证有效时只上传 build result 中列出的文件"
    status: done
  - action: "验证收尾：覆盖策略计划、manifest 写出、失败短路、COS 凭证缺失、上传失败可见性和 asmdef 边界"
    exit_signal: "Editor 编译通过，Runtime asmdef 不引用 SBP/COS 编辑器发布类型"
    status: done

checks:
  - item: "不引入 Addressables，不重写运行时资源加载模式"
    source: 范围守护
    status: pending
  - item: "不新增 ManifestInfo / PackageInfo / BundleInfo / AssetInfo 字段"
    source: 范围守护
    status: pending
  - item: "不做差量补丁、增量上传比对、CDN 刷新、灰度发布或版本回滚"
    source: 范围守护
    status: pending
  - item: "不把 COS SecretId / SecretKey 明文保存到项目文件"
    source: 范围守护
    status: pending
  - item: "不在构建成功后自动修改 ResourceSettings.ServerUrl 或默认 package"
    source: 范围守护
    status: pending
  - item: "不在资源编辑器里显示依赖 bundle 的人工编辑入口"
    source: 范围守护
    status: pending
  - item: "ResourceBuildSettings 保存输出根目录、目标平台、清理输出、压缩方式、manifest 文件名和构建范围"
    source: 名词契约
    status: pending
  - item: "ResourceBuildScope 覆盖当前 package、全部 package、仅热更 package"
    source: 名词契约
    status: pending
  - item: "ResourceBuildCompression 覆盖默认、LZ4、未压缩"
    source: 名词契约
    status: pending
  - item: "ResourcePublishSettings 保存 COS region、bucket、remote prefix、凭证来源名、上传并发限制和是否覆盖"
    source: 名词契约
    status: pending
  - item: "ResourceBuildStrategy 输入 ResourceBuildContext 并输出 ResourceBuildPlan"
    source: 名词契约
    status: pending
  - item: "ResourceBuildArtifact 记录本地路径、远端 key、bundle name、hash、size、crc、dependencies 和所属 package"
    source: 名词契约
    status: pending
  - item: "ResourcePublishPlan 只由 ResourceBuildResult 生成"
    source: 名词契约
    status: pending
  - item: "Build 成功才允许 Publish；Publish 不重新构建"
    source: 编排骨架
