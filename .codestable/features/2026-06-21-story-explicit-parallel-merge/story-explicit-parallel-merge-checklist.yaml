feature: 2026-06-21-story-explicit-parallel-merge
status: in-progress
steps:
  - id: runtime-sequential-semantics
    title: 修正运行时顺序语义
    status: done
    exit_signal: ShowImage -> PlayAudio -> Narration -> Choice 不再输出一个多轨 frame，而是按顺序停在每个可观察 step。
  - id: parallel-program-contract
    title: 建立并行运行时契约
    status: done
    exit_signal: StoryStepKind.Parallel/Merge、branch metadata 和 validation 能表达一个两分支并行块。
  - id: runner-parallel-context
    title: 实现 Runner 并行上下文
    status: done
    exit_signal: 多个轨道都能推进到当前 frame，并在同一 StoryFrame 输出 tracks。
  - id: branch-gates-and-merge
    title: 接通轨道闸口与合流推进
    status: done
    exit_signal: command/wait 只推进所在轨道，全部轨道到达 Merge 后继续后续顺序节点或选项。
  - id: compiler-and-port-policy
    title: 接通编译器与端口策略
    status: done
    exit_signal: 作者图中的 Parallel -> 轨道 -> Merge 可编译；非法结构有 graph diagnostic 和 compiler error。
  - id: samples-playback-tests-docs
    title: 更新示例、播放窗口、测试与文档
    status: done
    exit_signal: canonical sample 包含至少一个视频 + 音频 + 对白并行轨道块，Merge 后接选项；播放窗口可观察；runtime/editor builds 通过。
