feature: 2026-06-24-story-unlock-interaction-flow
created: 2026-06-24
steps:
  - action: "Command 协议与 state provider：建立 unlock command 常量、puzzle type 常量、IUnlockStateProvider 和默认 session provider"
    exit_signal: "runtime / playback 可通过 provider 读写 unlockId 状态，缺省 provider 能支撑默认 UI 测试"
    status: done
  - action: "Authoring schema 与 compiler：建立 NodeKind.Unlock、默认 schema、compiler 输出和 unlock 专用校验"
    exit_signal: "编译 Unlock 节点得到 unlock command，参数与 success/fail outcome 正确，非法 puzzleType / 缺目标给出定位错误"
    status: done
  - action: "Runtime 并行契约与状态契约：补 Parallel + PlayVideo + Wait -> unlock 的运行时验收，并覆盖 success/fail outcome"
    exit_signal: "wait 到点后 frame 同时包含 video command 与 unlock command，CompleteCommand(success/fail) 可推进"
    status: done
  - action: "StoryPlayback custom surface 与默认 overlay：让 StoryPlayerView 对 unlock 请求 Custom surface，并注册默认 handler / overlay"
    exit_signal: "channel 收到 Video 与 Custom request；已解锁自动 success；点击 Unlock 写 state 并 success；点击 Fail/Cancel fail；stop 清理 overlay"
    status: done
  - action: "Editor / seek guard 与范围守护：补带 unlock 的视频不写入 __videoSeekPolicy=transition，并跑 build / grep"
    exit_signal: "未出现 TimedChoice、EvaluateMediaTime、Story seek、InputModule 接入、IConditionResolver 或 Runtime/Story UI 引用"
    status: done
