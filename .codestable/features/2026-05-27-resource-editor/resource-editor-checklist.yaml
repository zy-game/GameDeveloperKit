feature: 2026-05-27-resource-editor
created: 2026-05-28

steps:
  - action: "扩展点和项目级配置骨架：定义 ResourceEditorSettings、package、bundle、collector id、build id、checker 配置，并接入 ProjectSettings 持久化"
    exit_signal: "首次打开能创建配置，关闭重开后 package/bundle 配置仍存在"
    status: done
  - action: "Attribute 扫描和 registry：扫描 ColletionAttribute、BuildedAttribute 和 ResourceChecker，建立可选项列表"
    exit_signal: "新增带 Attribute 的收集器 / 打包方式类型后，重开窗口可在 package 设置中选择；无可用类型时显示空状态"
    status: done
  - action: "UI Toolkit 静态骨架：落 UXML / USS，形成 toolbar、左侧 package list、package 设置、右侧 bundle foldout、group preview、checker issues"
    exit_signal: "窗口打开后布局稳定，空状态、热更 badge、bundle 区域、问题面板都可见"
    status: done
  - action: "package 列表绑定：支持新增、删除、选择 package，并展示热更徽章、收集器和打包方式摘要"
    exit_signal: "切换是否热更后左侧 badge 立即更新"
    status: done
  - action: "package 选项绑定：选中 package 后可从 registry 选择收集器类型和打包方式"
    exit_signal: "选择不同收集器后刷新预览会调用不同 collector；选择不同打包方式只更新配置，不执行构建"
    status: done
  - action: "bundle 配置绑定：选中 package 后展示可展开 bundle 列表，并支持 group、依赖、标签和收集参数编辑"
    exit_signal: "bundle foldout 展开后能看到 group 和收集资源预览区域"
    status: done
  - action: "收集预览与资源检查器：根据 package 选择的 collector 生成预览资源列表，再运行抽象资源检查器"
    exit_signal: "问题列表可点击定位 package/bundle/group/resource，error 阻止默认保存"
    status: done
  - action: "manifest 派生预留：建立从编辑器配置到 ManifestInfo 的转换边界，但不执行完整构建"
    exit_signal: "转换接口能说明哪些配置字段参与运行时 manifest，热更/collector/pack rule 不直接写入 runtime *Info 字段"
    status: done
  - action: "验证收尾：覆盖 UI 空状态、配置保存重开、Attribute 发现、热更 badge、bundle 展开、group 预览、checker 输出、USS 加载"
    exit_signal: "Editor 编译通过，UXML/USS 能在 Unity 2022.3 中加载，无 Runtime asmdef 污染"
    status: done

