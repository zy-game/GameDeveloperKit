feature: 2026-06-22-startup-component-entry
created: 2026-06-22
steps:
  - action: "Runtime 组件骨架：新增 FrameworkStartup、FrameworkStartupModuleOptions 和可 await 的 StartupAsync"
    exit_signal: "可通过代码创建组件并调用 StartupAsync，重复调用复用同一轮启动结果"
    status: done
  - action: "Procedure 类型解析与切换：接入 AssemblyQualifiedName 解析、类型校验和 ChangeAsync(Type, userData)"
    exit_signal: "有效目标 Procedure 成为 App.Procedure.Current，无效目标类型抛明确异常"
    status: done
  - action: "模块 ready 编排：接入 Resource 初始化、Config/Data 同步外壳解析和 Sound 显式配置"
    exit_signal: "开启资源初始化时目标 Procedure enter 前 App.Resource.IsInitialized 为 true；Config/Data 只创建模块，不新增 InitializeAsync；开启 Sound 解析时 SoundModule 注册"
    status: done
  - action: "Editor 下拉：新增 FrameworkStartupInspector，用 TypeCache 枚举可创建 Procedure"
    exit_signal: "Inspector 下拉写入目标 Procedure 的 AssemblyQualifiedName，并过滤 abstract / generic / 非 Procedure 类型"
    status: done
  - action: "覆盖验证：补 Runtime/Editor 侧可验证场景和反向 grep"
    exit_signal: "关键验收场景有测试或 grep 证据，Runtime 编译通过"
    status: done
checks:
  - item: "FrameworkStartup 是可挂载场景组件，不继承 ProcedureBase"
    source: 名词契约
    status: passed
  - item: "FrameworkStartupModuleOptions 使用内嵌 ResourceSettings 直接调用 ResourceModule.InitializeAsync，不依赖 Resources 下的 ResourceSettings asset"
    source: 名词契约
    status: passed
  - item: "FrameworkStartupModuleOptions 使用内嵌 SoundMixerSettings 配置 SoundModule，不依赖 Resources 下的 SoundMixerSettings asset"
    source: 名词契约
    status: passed
  - item: "StartupAsync 按 App.Startup -> 解析目标 Procedure -> 模块 ready -> App.Procedure.ChangeAsync 的顺序执行"
    source: 编排骨架
    status: passed
  - item: "StartupAsync 被 await 时向调用方抛异常，Unity Start 自动调用时记录 LastError 并输出异常日志"
    source: 流程级约束
    status: passed
  - item: "同一组件同一生命周期只执行一轮成功启动，重复调用不重复 ChangeAsync"
