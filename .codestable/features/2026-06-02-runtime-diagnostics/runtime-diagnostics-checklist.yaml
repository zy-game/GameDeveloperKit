feature: 2026-06-02-runtime-diagnostics
created: 2026-06-03

steps:
  - action: "模块迁移骨架：把 LoggerModule 目标名升级为 DebugModule，建立 Super.Debug、settings 和启用/关闭生命周期，保留现有日志行为"
    exit_signal: "注册后可访问 Super.Debug，现有等级/分类/sink 日志测试仍成立"
    status: pending
  - action: "日志缓存：实现 ring buffer、日志查询和 IMGUI Logs tab 的只读快照"
    exit_signal: "写入 Super.Debug 的日志能出现在 buffer，并可按等级/分类查询"
    status: pending
  - action: "IMGUI 与指标：实现 OnGUI 驱动、显示开关、FPS/frame time/内存基础采样"
    exit_signal: "运行时 GUI 能显示最近日志、FPS 和内存，关闭后不绘制"
    status: pending
  - action: "上传与崩溃线索：实现 debug bundle、redaction、crash provider 契约和 uploader 抽象"
    exit_signal: "可生成包含日志、环境、指标和 crash candidates 的 bundle，上传失败有明确 result"
    status: pending
  - action: "埋点通道：实现 AnalyticsEvent、Track、sink 注册和失败隔离"
    exit_signal: "业务 Track 调用能进入 sink，sink 失败不影响业务流程"
    status: pending
  - action: "CommandModule name + args：实现 command attribute/factory、参数绑定、ExecuteAsync(name,args) 和冲突处理"
    exit_signal: "Super.Command.ExecuteAsync(\"GM-ADD-ITEM\", \"sword\", 3) 能找到命令并按其 HistoryMode 执行"
    status: pending
  - action: "Debug 命令面板：IMGUI Command tab 解析一行输入并调用 CommandModule"
    exit_signal: "输入 GM-ADD-ITEM sword 3 能显示执行结果；DebugModule 不保存自己的 GM registry"
    status: pending
  - action: "安全与验证：补齐 redaction、Release 默认禁用、容量/频率上限、敏感字段反向核对和聚焦测试"
    exit_signal: "默认配置不会上传敏感字段，不会在 Release 自动启用命令/overlay/upload，Runtime 快速编译通过"
    status: pending

