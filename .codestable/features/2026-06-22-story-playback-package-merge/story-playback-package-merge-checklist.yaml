steps:
  - action: "结构微重构：按第 2.5 节拆分 Story 命令数据协议与播放协调类型，只搬不改行为"
    exit_signal: "StoryMediaCommandNames 仍由 GameDeveloperKit.Runtime 提供；播放协调类型在 StoryPlayback 编译；StoryPresenter/media handler 行为测试可迁移运行"
    status: done
  - action: "播放包骨架：创建 Runtime/StoryPlayback 与 GameDeveloperKit.StoryPlayback asmdef，接入必要依赖"
    exit_signal: "StoryPlayback asmdef 能解析 GameDeveloperKit.Runtime、AVProVideo.Runtime、UniTask、UnityEngine.UI 和 Unity.TextMeshPro"
    status: done
  - action: "默认播放器迁移：把 StoryPlayerView、图片/音频/AVPro 视频播放器、视频路径解析器和 prefab 收敛到 StoryPlayback"
    exit_signal: "StoryPlayerView、StoryImageCommandPlayer、StorySoundCommandPlayer、StoryAvProVideoCommandPlayer、StoryVideoPathResolver 均在 GameDeveloperKit.StoryPlayback 中编译"
    status: done
  - action: "旧引导清理：移除 StoryRuntimeDemoBootstrap、StoryProcedure、StoryProcedureRequest 和旧 presentation asmdef"
    exit_signal: "grep 不再命中旧引导类型作为可编译 runtime 类型，且旧 StoryPresentation asmdef 不再存在"
    status: done
  - action: "引用与测试接线：更新 Editor/Test asmdef、prefab builder 路径和旧 Procedure 反射测试"
    exit_signal: "Editor 与测试程序集引用 GameDeveloperKit.StoryPlayback，不再引用 GameDeveloperKit.StoryPresentation 或 GameDeveloperKit.StoryPresentation.AVPro"
    status: done
  - action: "验证收口：运行可用的编译/测试并记录无法运行的 Unity 限制"
    exit_signal: "GameDeveloperKit.Runtime.csproj、GameDeveloperKit.Editor.csproj、GameDeveloperKit.Editor.Tests.csproj 至少完成验证，失败或无法运行时有明确原因"
    status: done

