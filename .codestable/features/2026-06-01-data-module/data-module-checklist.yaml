feature: 2026-06-01-data-module
created: 2026-06-02

steps:
  - action: "模块入口和数据槽骨架：新增 Super.Data、DataModule、DataKeyAttribute、默认 key 常量和 type/key slot 规则"
    exit_signal: "注册 DataModule 后可访问 Super.Data，GetData<T>() 和 GetData<T>(key) 能返回区分开的缓存对象"
    status: done
  - action: "内存缓存与显式保存语义：实现 TryGetData、SetData 和 SaveAllAsync 的缓存遍历骨架"
    exit_signal: "同一槽复用同一对象，不同 key 隔离；SetData 只替换内存对象，不创建版本"
    status: done
  - action: "serializer 契约和 JSON 实现：实现 IDataSerializer、JsonDataSerializer 和 DataDocument envelope"
    exit_signal: "简单 POCO 可以序列化为带 metadata 的 JSON bytes，并从 bytes 还原"
    status: done
  - action: "版本索引与保存接线：实现 DataVersionInfo、version index、自动/指定 version、SaveDataAsync 和 SaveAllAsync"
    exit_signal: "每次保存生成一个新版本，index currentVersion 指向最新版本"
    status: done
  - action: "Load / Rollback / Delete 持久化编排：实现 current version 加载、指定版本加载、回滚和按 index 删除版本文件"
    exit_signal: "保存两个版本后可回滚到旧版本，Delete 后缓存与持久化索引都消失"
    status: done
  - action: "错误与边界路径：补齐缺 FileModule、坏 JSON、type/key/version 不匹配、重复 version、不可创建类型、不可序列化对象的错误语义"
    exit_signal: "关键失败都抛明确 GameException，消息包含 type key、data key、version 和路径"
    status: done
  - action: "生命周期清理：实现 Shutdown 清理缓存和 serializer 状态；不自动保存未显式保存的数据"
    exit_signal: "Shutdown 后缓存为空，不再持有旧数据对象"
    status: done
  - action: "验证覆盖：用 Runtime 编译和聚焦测试覆盖 type/key 缓存、JSON 保存恢复、版本回滚、删除、错误路径和范围守护"
    exit_signal: "dotnet build GameDeveloperKit.Runtime.csproj --no-restore 通过，关键验收契约有可观察证据"
    status: done

