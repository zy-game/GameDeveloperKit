feature: 2026-06-23-story-playback-view-input-layers
created: 2026-06-23

steps:
  - action: "结构微重构：把默认文本、继续、选项按钮绑定和 surface 打包从 StoryPlayerView 拆到默认 interaction channel 相关类型，只搬不改行为"
    exit_signal: "StoryPlayerView.CreateDefault 和现有默认播放行为保持可用，默认文本、继续、选项、视频和图片显示不退化"
    status: done
  - action: "单入口契约：新增 IInteractionChannel、InteractionRequest、PlaybackSurfaceView、DefaultInteractionChannel 和 App.Story.SetInteractions extension/registry"
    exit_signal: "调用侧只需要注册一个 channel；不存在 provider、controller、旧 layer 或旧 channel 并行接口"
    status: done
  - action: "生命周期接线：在 StoryPlayback session 与 frame 切换时通知 OnAwake、OnStoryStarted、OnChapterChanged、OnFrameChanged 和 OnStoryStopped"
    exit_signal: "OnAwake 早于剧情/媒体预热，OnStoryStarted 晚于预热；章节切换时先通知 channel，再发生任何 surface 查询"
    status: done
  - action: "播放前预热接线：OnAwake 后先解析启动首帧并预热 play_video 命令，成功后才调用 OnStoryStarted"
    exit_signal: "视频预热失败时不会触发 OnStoryStarted 或 surface 查询；预热成功后才进入真实播放启动"
    status: done
  - action: "Surface 查询接线：文本、继续、选项、视频和图片都通过 GetPlaybackSurfaceView(request) 获取 UI 引用"
    exit_signal: "自定义章节 UI 能提供非全屏 RawImage、文本控件、继续按钮和等量 ChoiceButtons，StoryPlayback 不实例化选项 prefab"
    status: done
  - action: "错误与清理：缺失必需 surface 或 ChoiceButtons 数量不匹配时报配置错误，停止播放或章节切换时清理旧 listener 和旧引用"
    exit_signal: "不会静默使用上一章控件；StopPlayback 后无临时按钮 listener 残留"
    status: done
  - action: "验证与范围守护：补 runtime tests、编译或 grep 证据，覆盖默认路径、自定义 channel、预热生命周期、章节切换、缺失 surface 和 Runtime/Story 隔离"
    exit_signal: "可用测试/编译通过，且 grep 证明没有新增 TimedChoice、slot、seek、旧 interaction 接口或 Runtime/Story UI 创建逻辑"
    status: done

