feature: 2026-05-31-uidocument-inspector-bindings
created: 2026-05-31

steps:
  - action: "绑定 schema 简化：把 UIBindMapping.Components 改为 Component[]，删除 UIComponentBindMapping，生成器改读组件引用"
    exit_signal: "Runtime / Editor 编译能识别新的 Component[] 结构，UIComponentBindMapping、TypeName 和组件级 Name 不再存在"
    status: done
  - action: "Inspector 布局骨架：把 Code Generation 移到 Bindings 之前，新增 Bindings 工具栏和层级树入口"
    exit_signal: "Inspector 顶部能看到生成区，绑定区仍能显示现有数据"
    status: done
  - action: "绑定名初始化：实现手动 Add 和 AutoBind 新增时的 Name = Target.name 规则"
    exit_signal: "新建或选择目标后空 binding name 自动变成目标对象名，已有自定义 name 不被覆盖"
    status: done
  - action: "AutoBind 编排：扫描 document 子孙 b_ GameObject，幂等写入 mappings"
    exit_signal: "重复点击 AutoBind 只新增缺失项，不重复、不删除手工项"
    status: done
  - action: "组件多选下拉：用下拉菜单替换组件 Toggle 列表，并同步 Component[]"
    exit_signal: "同一 target 上可一次选择多个组件引用，Tree 行内摘要刷新后选择仍保留"
    status: done
  - action: "生成字段命名：实现组件类型前缀 + binding 后缀的统一字段名生成"
    exit_signal: "b_example 上选择 Button / Text 时生成 btn_example / text_example，组件不需要单独命名"
    status: done
  - action: "TreeView 承载：用 Unity Editor TreeView 呈现绑定列表中的目标，并在每行右侧绘制组件绑定下拉"
    exit_signal: "绑定数量较多时列表不再平铺展开；未绑定节点不显示，每个绑定目标右侧能直接看到 Nothing / Everything / 已选组件摘要"
    status: done
  - action: "验证收尾：覆盖空 target、inactive 子节点、重复 AutoBind、组件引用缺失和生成器校验路径"
    exit_signal: "Editor 编译通过，关键验收场景有手工或测试证据"
    status: done

