feature: 2026-06-09-debug-profile-table-redesign
created: 2026-06-09

steps:
  - action: "前置微重构：从 ProfileHandle.cs 拆出 DebugProfileHandle 和 MemoryProfileHandle 到同名文件，并新增 DeviceInfoProfileHandle.cs"
    exit_signal: "只搬不改行为后 Runtime 快速编译通过"
    status: done
  - action: "Profile 契约收敛：把 ProfileHandle 改为 Name-only 公开契约和派生类自绘模型"
    exit_signal: "自定义 profile 只实现 Name 和绘制钩子，不需要任何 column/row/table helper 就能显示"
    status: done
  - action: "Registry 与 Profiles tab 改线：registry 不再生成 ProfileTable，GUI 安全调用每个 handle 的绘制钩子"
    exit_signal: "一个 draw 抛异常的 profile 不影响其他 profile 和 Logs tab"
    status: done
  - action: "Memory 曲线 profile：固定容量采样并自行绘制曲线和摘要数据"
    exit_signal: "运行一段时间后 Profiles tab 能看到连续 memory 曲线，buffer 容量不增长"
    status: done
  - action: "Device Info profile：注册并自行绘制非敏感设备/平台信息"
    exit_signal: "Profiles tab 能看到 Device Info profile，敏感 ID 不出现"
    status: done
  - action: "移除旧模型与文档同步：清理旧 column/row/table 类型使用点，并更新架构/roadmap 里的旧契约描述"
    exit_signal: "Runtime 快速编译通过，文档不再声明 Columns、Snapshot、SetColumn 或 AddRow 是当前契约"
    status: done

