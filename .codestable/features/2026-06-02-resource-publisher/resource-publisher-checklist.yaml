feature: 2026-06-02-resource-publisher
created: 2026-06-02

steps:
  - action: "职责拆分清理：Resource Editor 保留本地构建输出能力，移除 publish / COS / channel UI 和设置"
    exit_signal: "Resource Editor UI 可配置本地构建输出，但不出现 COS、bucket、region、channel、publish、rollback 字段或按钮"
    status: done
  - action: "Publisher 设置与窗口骨架：新增独立窗口、settings、profile/channel 列表和 build-result 选择入口"
    exit_signal: "关闭重开 Unity 后 profile 非密钥字段、channel 发布配置和最近 build result 路径仍存在"
    status: done
  - action: "对象存储 provider 抽象：实现 registry、通用模型和 provider 能力查询"
    exit_signal: "Publisher UI 通过 provider 接口读取平台显示名和能力，不直接引用 COS 类型"
    status: done
  - action: "COS provider 首版接入：基于现有 DLL 和示例实现区域列表、桶列表、创建桶、删除桶、对象上传"
    exit_signal: "凭证有效时能列 COS bucket，凭证无效时显示脱敏错误"
    status: done
  - action: "上传计划与版本索引：由选中的 ResourceBuildResult 生成 upload plan，上传后写 ResourcePublishIndex"
    exit_signal: "远端出现 build result 中列出的 bundle/manifest 和 channel index，index 记录当前版本和历史版本"
    status: done
  - action: "版本更新与回滚：在 Publisher 展示历史版本，支持切换 current version"
    exit_signal: "上传两个版本后可把 current 回滚到旧版本，旧对象不删除"
    status: done
  - action: "结果窗口与验证：覆盖桶操作、上传、失败、脱敏、Runtime 边界和旧 Resource Editor 发布代码清理"
    exit_signal: "Editor 编译通过；Runtime asmdef 不引用对象存储 SDK；grep 不到 ResourceEditorWindow 中的 COS/Publish UI"
    status: done

