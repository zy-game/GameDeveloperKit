feature: 2026-06-20-story-graph-port-policy
created: 2026-06-20

steps:
  - action: "微重构：拆出 Story 端口策略 helper，让 adapter/window 共享连接语义和容量判断"
    exit_signal: "编译通过；adapter 仍返回 EditorGraphConnectionResult；window 写回边不再维护一套不一致的多连判断"
    status: done
  - action: "Editor adapter 策略接入：让 CanConnect 按节点类型、端口、容量和目标返回具体中文原因"
    exit_signal: "Start、End、文本、Choice、命令、条件、跳转/等待和辅助节点的合法/非法连接都有可验证结果"
    status: done
  - action: "写回容量对齐：让单连替换、多连保留和重复边提示使用同一 Story port policy 口径"
    exit_signal: "同一个单连端口改连不同目标后只保留一条边；文本 completed 到多个 Choice 保留多条边"
    status: done
  - action: "Runtime validation 兜底：收紧输出端口存在性、重复单输出和 editor-only/辅助节点非法数据校验"
    exit_signal: "未知输出端口、重复单连端口、editor-only 辅助节点进入 runtime definition 都会失败并带定位"
    status: done
  - action: "测试与证据：补齐 policy/adapter/runtime validation 场景并运行相关构建"
    exit_signal: "Editor.Tests 或 Runtime.Tests 覆盖关键端口规则；相关 csproj build 和 diff check 通过"
    status: done

