    exit_signal: "Definition v3 可表达章节语义图，旧 v2 数据有迁移报告"
    status: done
  - action: "Node schema registry：建立 NodeKind 分类、默认 ports、typed parameter schema、editor-only 标记"
    exit_signal: "PlayVideo/Dialogue/Choice/MiniGame/Branch/SetFlag/EmitEvent/Reroute/Comment 等节点 schema 可查询"
    status: done
  - action: "Runtime execution v3：按 semantic node + edge 重写校验、启动、自动推进、选择、外部完成、snapshot restore"
    exit_signal: "Start/Action/Interaction/Branch/ChapterJump/StoryEnd/Snapshot 核心测试通过"
    status: done
  - action: "Authoring model v3：StoryAuthoringAsset 改为 chapters/nodes/edges/layout/parameters，迁移 v2 owner action/transition 数据"
    exit_signal: "旧 asset 导入后生成 semantic nodes/edges 或明确迁移警告"
    status: done
  - action: "GraphView semantic UI：画布菜单、端口拖拽创建、语义 edge、辅助节点、grid/drag/zoom 重建"
    exit_signal: "Action/Interaction/Condition/Auxiliary 节点可直接创建、连接、移动，不需要 owner port"
    status: done
  - action: "Inspector schema UI：按 NodeParameterSchema 渲染 typed parameters；移除 Payload/owner/next_2 主表单"
    exit_signal: "选中节点/edge 时只显示业务字段和 debug 折叠区"
    status: done
  - action: "Mapper / validator / exporter / CSV v3：按 semantic graph 导出 runtime definition 和 CSV"
    exit_signal: "JSON/CSV round-trip 保持 node/edge/parameter/condition id 和 label"
    status: done
  - action: "验证覆盖与 UI 证据：补齐 runtime、editor mapper、CSV、迁移和图编辑路径验证"
    exit_signal: "关键验收场景都有自动测试或可复核记录，且不会触发 Resource/Localization/Data/Procedure"
    status: pending

