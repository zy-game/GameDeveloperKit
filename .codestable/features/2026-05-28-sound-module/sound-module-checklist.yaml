feature: 2026-05-28-sound-module
created: 2026-05-28

steps:
  - action: "生命周期骨架：让 SoundModule 可注册、可关闭，创建 / 销毁 SoundRoot。"
    exit_signal: "Super.Register<SoundModule>() 不再抛 NotImplementedException，Shutdown 后无 SoundRoot 残留。"
    status: done
  - action: "名词契约：补齐 SoundTrack、SoundStatus、SoundPlayOptions、SoundHandle 和可选 mixer settings。"
    exit_signal: "公开 API 能表达背景音、音效、音轨音量和 mixer 效果入口。"
    status: done
  - action: "播放源编排：建立 track state、Music 常驻源、Sfx source pool 和资源句柄记录。"
    exit_signal: "模块能取得 AudioSource、绑定 track、记录 active handles。"
    status: done
  - action: "AudioClip 加载与背景音播放：接入 ResourceModule 加载 AudioClip，实现 PlayMusicAsync 和切歌释放。"
    exit_signal: "有效 AudioClip location 可以循环播放；切换音乐会停止并释放旧音乐。"
    status: done
  - action: "音效播放与自动回收：实现 PlaySfxAsync / PlaySfxAtAsync、并发上限、完成监控和 source 回收。"
    exit_signal: "短音效可并发播放并在结束后释放资源，不留下 active handle。"
    status: done
  - action: "音量与 mixer 效果：实现 SetVolume / GetVolume / SetMixerFloat / TransitionSnapshot。"
    exit_signal: "单独调整 Music / Sfx 音量可立即影响播放中实例；mixer 参数和 snapshot 路径有明确返回结果。"
    status: done
  - action: "停止、暂停和 Shutdown 清理：覆盖 Stop、StopTrack、PauseTrack、ResumeTrack 和模块退出。"
    exit_signal: "按实例 / 音轨控制播放可靠，Shutdown 后资源句柄和 AudioSource 清空。"
    status: done
  - action: "验证覆盖：覆盖正常播放、边界输入、资源错误、mixer 缺失和并发上限。"
    exit_signal: "Runtime 编译通过，关键验收契约有可观察证据。"
    status: done

