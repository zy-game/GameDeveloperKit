roadmap: runtime-scheduling-diagnostics
created: 2026-06-08

items:
  - slug: timer-update-consumer-contract
    description: 为 TimerModule 增加 Update/LateUpdate/FixedUpdate 三类显式 update handle 注册、context、异常隔离和 snapshot
    depends_on: []
    status: done
    feature: 2026-06-08-timer-update-consumer-contract
    minimal_loop: true
    notes: 最小闭环已完成；历史 slug 保留 consumer，实际契约是 UpdateTimerHandle、LateUpdateTimerHandle、FixedUpdateTimerHandle。

  - slug: debug-profilehandle-hardening
    description: 修正 ProfileHandle 元数据异常隔离和 redaction ToString 兜底，并把 Debug 日志/内存状态拆为内建 profile handle
    depends_on: []
    status: done
    feature: 2026-06-08-debug-profilehandle-hardening
    minimal_loop: false
    notes: 已落地 DebugProfileHandle 接收日志、脱敏和内存 buffer；ProfileHandle 已收敛为 Name-only + 派生类自绘；MemoryProfileHandle 自绘 memory 曲线，DeviceInfoProfileHandle 自绘非敏感设备信息；旧 sink/analytics/transport 扩展点已移除，DebugModule 只管理 profile lifecycle 和薄入口。

  - slug: debug-timer-refresh
    description: 让 Debug metrics sampling 注册为 Timer update handle，DebugGuiDriver 只保留 OnGUI 绘制桥接
    depends_on: [timer-update-consumer-contract, debug-profilehandle-hardening]
    status: planned
    feature: null
    minimal_loop: false
    notes: 对应 2026-06-08 Debug 审计 finding-04。

  - slug: procedure-timer-consumer
    description: ProcedureModule 删除独立 update driver，改为 Timer update handle 推进当前 procedure
    depends_on: [timer-update-consumer-contract]
    status: planned
    feature: null
    minimal_loop: false
    notes: 迁移后 Procedure startup 需要明确 Timer 缺失语义。

  - slug: combat-timer-consumer
    description: CombatModule 删除独立 update driver，改为 Timer update handle 推进默认 world
    depends_on: [timer-update-consumer-contract]
    status: planned
    feature: null
    minimal_loop: false
    notes: 保留 Combat 按需注册，不引入网络同步或多 world 调度。

  - slug: runtime-module-profile-handles
    description: 为 Timer、Procedure、Combat 等运行时模块补充自绘 ProfileHandle，统一暴露运行时诊断状态
    depends_on: [timer-update-consumer-contract, debug-profilehandle-hardening, procedure-timer-consumer, combat-timer-consumer]
    status: planned
    feature: null
    minimal_loop: false
    notes: 后续模块 profile 必须接入 Name-only + 派生类自绘契约；Debug 默认只保留 Memory 曲线和 Device Info，不再要求 Debug 状态 profile。

  - slug: network-debug-log-transport-contract
    description: 由 Network 模块定义 Debug log bridge 和 payload 字段，读取 DebugProfileHandle 中已脱敏日志做实时发送
    depends_on: [debug-profilehandle-hardening]
    status: planned
    feature: null
    minimal_loop: false
    notes: 不实现完整 NetworkModule；Debug 不再保留旧日志 transport 接口，具体网络发送、重试、批量和断线缓存归 Network 模块实现。
