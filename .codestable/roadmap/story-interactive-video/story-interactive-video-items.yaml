roadmap: story-interactive-video
created: 2026-06-23
last_reviewed: 2026-06-24
items:
  - slug: story-playback-view-input-layers
    title: 剧情播放视图与交互通道拆分
    description: 建立 App.Story.SetInteractions(channel) 单一交互通道入口，让 interaction channel 按章节创建 UI，并通过 GetPlaybackSurfaceView(request) 提供视频、图片、文本、继续和选项 surface。
    depends_on: []
    status: done
    feature: 2026-06-23-story-playback-view-input-layers
    minimal_loop: true
    notes: 完成后播放一个章节时，UI 不再依赖底部单面板或固定全屏播放层，而是由注册的 interaction channel 根据当前章节提供 RawImage、按钮、文本和自定义 UI surface。
  - slug: story-transition-video-seek-controls
    title: 纯过渡视频拖动预览
    description: 由编译器根据图结构推导纯过渡视频，并为可推导为 transition 的 play_video 写入隐藏 __videoSeekPolicy，让运行时显示时间条并支持 seek(time)；分支互动视频不开放 seek。
    depends_on:
      - story-playback-view-input-layers
    status: done
    feature: 2026-06-23-story-transition-video-seek-controls
    minimal_loop: false
    notes: 不暴露 playbackRole/seekable 作者字段；只改变 AVPro 当前媒体时间，不改变 StoryRunner 分支状态。比如开场第一个纯过渡视频可由 compiler 推导为 transition，后续承载对白/选项的分支互动视频不开放 seek。
  - slug: story-parallel-wait-interaction-flow
    title: 多轨等待交互编排
    description: 用现有 Parallel + Wait + Choice/Command 跑通视频播放过程中出现选项或命令互动，不新增 TimedChoice 或媒体时间 runtime API。
    depends_on:
      - story-playback-view-input-layers
    status: done
    feature: 2026-06-24-story-parallel-wait-interaction-flow
    minimal_loop: false
    notes: 验证 PlayVideo 分支和 Wait(35)->Choice 分支可同章并行，wait 到点后由 interaction channel 显示普通选项并通过 Select(choiceId) 推进。
  - slug: story-video-qte-command
    title: 视频播放中 QTE
    description: 支持视频播放中的 qte command overlay，默认不暂停音视频，并通过 success/fail outcome 推进剧情。
    depends_on:
      - story-playback-view-input-layers
      - story-parallel-wait-interaction-flow
    status: done
    feature: 2026-06-24-story-video-qte-command
    minimal_loop: false
    notes: QTE 出现时机由 Wait(N)->qte command 表达；首版只保证 success/fail，输入映射使用最小键盘或点击实现。
  - slug: story-unlock-interaction-flow
    title: 解锁类互动流程
    description: 建立 unlock command 和 unlock state provider，复用现有 function resolver 做条件判断，用 outcome 表达连线解锁、节点解锁等互动结果。
    depends_on:
      - story-playback-view-input-layers
      - story-parallel-wait-interaction-flow
    status: done
    feature: 2026-06-24-story-unlock-interaction-flow
    minimal_loop: false
    notes: 解锁出现时机由 Wait(N)->unlock command 或普通 command 链路表达；首版只做协议、unlock state provider 和最小默认 interaction channel 承接，不做完整谜题编辑器。
  - slug: story-editor-interaction-authoring-patterns
    title: 编辑器互动编排模板
    description: 在 Story Editor 中提供 Parallel + Wait + Choice/QTE/Unlock 作者模板和图上校验，并展示编译器推导出的纯过渡视频 seek 诊断，不新增 TimedChoice、layout slot、anchor 或 seekable 作者字段。
    depends_on:
      - story-transition-video-seek-controls
      - story-parallel-wait-interaction-flow
      - story-video-qte-command
      - story-unlock-interaction-flow
    status: done
    feature: 2026-06-24-story-editor-interaction-authoring-patterns
    minimal_loop: false
    notes: 只开放 runtime/playback 已闭合的命令和模板；一键模板生成现有节点组合，不生成新 runtime step。
  - slug: story-interactive-video-sample-acceptance
    title: 交互视频样例验收
    description: 提供交互视频样例和验收测试，覆盖非全屏视频 surface、并行等待后出现选项、QTE success/fail 和解锁 outcome。
    depends_on:
      - story-editor-interaction-authoring-patterns
    status: planned
    feature: null
    minimal_loop: false
    notes: 验收完成后再回写 architecture/requirements 当前能力。
  - slug: story-presentation-layout-slots
    title: 剧情呈现位置与 Overlay Slot
    description: 已废弃。交互通道提供 view surface 后，不再需要 Runtime/Story 或 StoryPlayback 共享 StoryPresentationAnchorPreset、slot、normalized rect 等呈现协议。
    depends_on:
      - story-playback-view-input-layers
    status: dropped
    feature: null
    minimal_loop: false
    notes: dropped on 2026-06-23; 布局完全交给 interaction channel、章节 UI prefab 和 GetPlaybackSurfaceView(request) 控制。
  - slug: story-video-timed-choice
    title: 视频时间点暂停选项
    description: 已废弃。现有 Parallel + Wait + Choice 已能表达视频过程中出现选项，不新增 TimedChoice 节点或媒体时间 runtime API。
    depends_on:
      - story-playback-view-input-layers
      - story-parallel-wait-interaction-flow
    status: dropped
    feature: null
    minimal_loop: false
    notes: dropped on 2026-06-23; 若未来必须严格绑定 AVPro 当前媒体时间，需要先回 roadmap update 重新设计。
  - slug: story-editor-interactive-nodes
    title: 编辑器互动节点
    description: 已废弃。不开放 TimedChoice/layout 字段，改由 story-editor-interaction-authoring-patterns 提供现有节点组合模板。
    depends_on:
      - story-parallel-wait-interaction-flow
      - story-video-qte-command
      - story-unlock-interaction-flow
    status: dropped
    feature: null
    minimal_loop: false
    notes: dropped on 2026-06-23; 旧 unsupported 节点不作为默认作者主路径恢复。
